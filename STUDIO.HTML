<body style="background:#0f0f0f;color:white">

<h2>Datuber Studio</h2>

<p id="views"></p>
<p id="videos"></p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase=window.supabase.createClient("SUA_URL","SUA_KEY");
let user=localStorage.getItem("user");

async function carregar(){
let {data}=await supabase.from("videos").select("*");

let totalViews=0;
let totalVideos=0;

data.forEach(v=>{
if(v.dono==user){
totalViews+=v.views;
totalVideos++;
}
});

views.innerText="Views: "+totalViews;
videos.innerText="Vídeos: "+totalVideos;
}
<p onclick="abrirStudio()">📊 Studio</p>
carregar();
</script>
