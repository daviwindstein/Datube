<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<video id="player" controls width="100%"></video>

<h2 id="titulo"></h2>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || [];
let id = localStorage.getItem("videoAtual");

if(!videos[id]){
alert("Vídeo não encontrado");
}

let v = videos[id];

document.getElementById("player").src = v.video;
document.getElementById("titulo").innerText = v.titulo;

</script>

</body>
</html>
