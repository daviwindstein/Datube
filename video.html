<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assistir</title>

<style>
body { background:#0f0f0f; color:white; font-family:Arial; }

.container {
  display: flex;
  gap: 20px;
}

.video {
  flex: 2;
}

.recomendados {
  flex: 1;
}

iframe {
  width: 100%;
  height: 400px;
}

button {
  background:red;
  border:none;
  color:white;
  padding:5px;
}

.comentario {
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="video">

<iframe id="player"></iframe>

<h2 id="titulo"></h2>
<p onclick="abrirCanal()" id="canal"></p>

<button onclick="like()">👍 Like</button>
<button onclick="inscrever()">🔔 Inscrever</button>

<h3>Comentários</h3>
<button onclick="comentar()">Comentar</button>
<div id="comentarios"></div>

</div>

<div class="recomendados" id="recomendados"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "COLE_AQUI",
  projectId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let usuario = localStorage.getItem("user");
let donoVideo = "";

// CARREGAR
async function carregar(){
  let query = await getDocs(collection(db, "videos"));

  query.forEach(doc => {
    if(doc.id === id){
      let v = doc.data();

      document.getElementById("player").src = v.url;
      document.getElementById("titulo").innerText = v.titulo;
      document.getElementById("canal").innerText = v.dono;

      donoVideo = v.dono;
    } else {
      let v = doc.data();

      document.getElementById("recomendados").innerHTML += `
        <div onclick="abrirVideo('${doc.id}')">
          <img src="${v.thumb}" width="100%">
          <p>${v.titulo}</p>
        </div>
      `;
    }
  });
}

// COMENTAR
window.comentar = async () => {
  let texto = prompt("Comentário:");

  await addDoc(collection(db, "comentarios"), {
    videoId: id,
    usuario: usuario,
    texto
  });

  carregarComentarios();
}

// MOSTRAR COMENTÁRIOS
async function carregarComentarios(){
  let lista = document.getElementById("comentarios");
  lista.innerHTML = "";

  let query = await getDocs(collection(db, "comentarios"));

  query.forEach(doc => {
    let c = doc.data();

    if(c.videoId === id){
      lista.innerHTML += `<p><b>${c.usuario}</b>: ${c.texto}</p>`;
    }
  });
}

// LIKE
window.like = () => alert("Like 👍");

// INSCRVER
window.inscrever = async () => {
  await addDoc(collection(db, "inscricoes"), {
    canal: donoVideo,
    usuario: usuario
  });

  alert("Inscrito!");
}

// ABRIR CANAL
window.abrirCanal = () => {
  window.location.href = "canal.html?user=" + donoVideo;
}

window.abrirVideo = (id) => {
  window.location.href = "video.html?id=" + id;
}

carregar();
carregarComentarios();

</script>

</body>
</html>
