<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#0f0f0f;color:white">

<video id="player" controls width="100%"></video>
<h2 id="titulo"></h2>

<button onclick="like()">👍 Like</button>
<button onclick="comentar()">💬 Comentar</button>

<div id="comentarios"></div>

<script>
const supabase=window.supabase.createClient("SUA_URL","SUA_KEY");
let id=new URLSearchParams(location.search).get("id");

async function carregar(){
let {data}=await supabase.from("videos").select("*").eq("id",id).single();

player.src=data.url;
titulo.innerText=data.titulo;

await supabase.from("videos").update({
views:data.views+1
}).eq("id",id);

carregarComentarios();
}

async function like(){
let {data}=await supabase.from("videos").select("likes").eq("id",id).single();
await supabase.from("videos").update({likes:data.likes+1}).eq("id",id);
alert("Like!");
}

async function comentar(){
let texto=prompt("Comentário:");
await supabase.from("comentarios").insert([{video:id,texto:texto}]);
carregarComentarios();
}

async function carregarComentarios(){
let {data}=await supabase.from("comentarios").select("*");

comentarios.innerHTML="";
data.forEach(c=>{
if(c.video==id){
comentarios.innerHTML+=`<p>${c.texto}</p>`;
}
});
}

carregar();
</script>

</body>
</html>
