<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assistir</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{background:#0f0f0f;color:white;font-family:Arial;}
video{width:100%;}
button{background:red;color:white;border:none;padding:10px;}
</style>
</head>

<body>

<video id="player" controls></video>

<h2 id="titulo"></h2>

<button onclick="darLike()">👍 Like</button>

<script>

const supabase = window.supabase.createClient("SUA_URL","SUA_KEY");

let id = new URLSearchParams(location.search).get("id");

// carregar vídeo
async function carregar(){

let { data } = await supabase.from("videos").select("*").eq("id",id).single();

document.getElementById("player").src = data.url;
document.getElementById("titulo").innerText = data.titulo;

// view automático
await supabase.from("videos").update({
views: data.views + 1
}).eq("id",id);

}

// like
async function darLike(){

let { data } = await supabase.from("videos").select("likes").eq("id",id).single();

await supabase.from("videos").update({
likes: data.likes + 1
}).eq("id",id);

alert("Like!");
}

carregar();

</script>

</body>
</html>
