<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Assistir</title>

<style>
body { background:#0f0f0f; color:white; font-family:Arial; }

.container { display:flex; gap:20px; }
.video { flex:2; }
.side { flex:1; }

iframe { width:100%; height:400px; }
</style>
</head>

<body>

<div class="container">

<div class="video">
<iframe id="player"></iframe>

<h2 id="titulo"></h2>
<p onclick="abrirCanal()" id="canal"></p>

<button onclick="inscrever()">Inscrever</button>

<h3>Comentários</h3>
<button onclick="comentar()">Comentar</button>
<div id="comentarios"></div>

</div>

<div class="side" id="recomendados"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({apiKey:"COLE_AQUI", projectId:"COLE_AQUI"});
const db = getFirestore(app);

let usuario = localStorage.getItem("user");
let params = new URLSearchParams(location.search);
let id = params.get("id");
let dono="";

async function carregar(){
  let q = await getDocs(collection(db,"videos"));

  q.forEach(doc=>{
    let v = doc.data();

    if(doc.id===id){
      player.src = v.url;
      titulo.innerText = v.titulo;
      canal.innerText = v.dono;
      dono = v.dono;
    } else {
      recomendados.innerHTML+=`
      <div onclick="abrirVideo('${doc.id}')">
        <img src="${v.thumb}" width="100%">
        <p>${v.titulo}</p>
      </div>`;
    }
  });
}

window.comentar = async ()=>{
  let texto = prompt("Comentário:");
  await addDoc(collection(db,"comentarios"),{videoId:id, usuario, texto});
  carregarComentarios();
}

async function carregarComentarios(){
  comentarios.innerHTML="";
  let q = await getDocs(collection(db,"comentarios"));

  q.forEach(doc=>{
    let c = doc.data();
    if(c.videoId===id){
      comentarios.innerHTML+=`<p><b>${c.usuario}</b>: ${c.texto}</p>`;
    }
  });
}

window.inscrever = async ()=>{
  await addDoc(collection(db,"inscricoes"),{canal:dono, usuario});
  alert("Inscrito!");
}

window.abrirCanal = ()=>{
  location.href="canal.html?user="+dono;
}

window.abrirVideo = (id)=>{
  location.href="video.html?id="+id;
}

carregar();
carregarComentarios();
<script>
// PEGAR ID DO VÍDEO SELECIONADO
let id = localStorage.getItem("videoAtual");
let videos = JSON.parse(localStorage.getItem("videos")) || [];

if(videos[id]){
  let v = videos[id];
  document.getElementById("player").src = v.url;
  document.getElementById("titulo").innerText = v.titulo;
  document.getElementById("canal").innerText = v.dono;
} else {
  document.getElementById("player").src = "";
  document.getElementById("titulo").innerText = "Vídeo não encontrado";
  document.getElementById("canal").innerText = "";
}
</script>
</script>

</body>
</html>
