<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Assistir Vídeo</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;}
video{width:100%;max-height:500px;}
#comentarios{margin-top:10px;}
</style>
</head>
<body>

<h2 id="titulo"></h2>
<p id="canal"></p>
<video id="player" controls></video>
<button onclick="likeVideo()">Curtir ❤️</button>
<button onclick="inscrever()">Inscrever-se</button>

<h3>Comentários</h3>
<button onclick="comentar()">Comentar</button>
<div id="comentarios"></div>

<script>
let db;
const idVideo = Number(localStorage.getItem("videoAtual"));
let usuario = localStorage.getItem("usuario");

// --- INDEXEDDB ---
const request = indexedDB.open("DatuberDB",1);
request.onsuccess = e => {
  db = e.target.result;
  carregarVideo();
};

function carregarVideo(){
  const tx = db.transaction(["videos"],"readonly");
  const store = tx.objectStore("videos");
  const req = store.get(idVideo);
  req.onsuccess = e=>{
    const v = e.target.result;
    if(!v){alert("Vídeo não encontrado!"); return;}
    document.getElementById("player").src = v.video;
    document.getElementById("titulo").innerText = v.titulo;
    document.getElementById("canal").innerText = v.dono;
    renderComentarios(v.comentarios);
  }
}

// --- COMENTARIOS ---
function comentar(){
  if(!usuario) return alert("Faça login!");
  const txt = prompt("Digite seu comentário:");
  if(!txt) return;
  const tx = db.transaction(["videos"],"readwrite");
  const store = tx.objectStore("videos");
  const req = store.get(idVideo);
  req.onsuccess = e=>{
    const v = e.target.result;
    v.comentarios.push({usuario, texto:txt});
    const upd = store.put(v);
    upd.onsuccess = ()=>renderComentarios(v.comentarios);
  }
}

function renderComentarios(list){
  const div = document.getElementById("comentarios");
  div.innerHTML="";
  list.forEach(c=>{
    div.innerHTML += `<p><b>${c.usuario}:</b> ${c.texto}</p>`;
  });
}

// --- LIKES ---
function likeVideo(){
  if(!usuario) return alert("Faça login!");
  const tx = db.transaction(["videos"],"readwrite");
  const store = tx.objectStore("videos");
  const req = store.get(idVideo);
  req.onsuccess = e=>{
    const v = e.target.result;
    v.likes++;
    store.put(v);
    alert("Curtido! Total: "+v.likes);
  }
}

// --- INSCRITOS ---
function inscrever(){
  if(!usuario) return alert("Faça login!");
  alert("Inscrito no canal de "+document.getElementById("canal").innerText+" ✅");
}
</script>
</body>
</html>
