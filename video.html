<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Assistir</title>
<style>
body { background:#0f0f0f; color:white; font-family:Arial; }
.container { display:flex; gap:20px; }
.video-section { flex:2; }
.side { flex:1; }
video { width:100%; max-height:400px; }
button { background:red; border:none; color:white; padding:5px; margin:2px; cursor:pointer; }
.comment { border-top:1px solid #333; padding:5px; }
</style>
</head>
<body>

<div class="container">
  <div class="video-section">
    <video id="player" controls></video>
    <h2 id="titulo"></h2>
    <p id="canal"></p>
    <button id="inscreverBtn">Inscrever</button>
    <button id="likeBtn">Like (<span id="likes">0</span>)</button>
    <h3>Comentários</h3>
    <input id="commentInput" placeholder="Escreva um comentário">
    <button onclick="comentar()">Postar</button>
    <div id="comentarios"></div>
  </div>
  <div class="side">
    <h3>Recomendados</h3>
    <div id="recomendados"></div>
  </div>
</div>

<script>
let usuario = localStorage.getItem("user");
let videos = JSON.parse(localStorage.getItem("videos")) || [];
let users = JSON.parse(localStorage.getItem("users")) || [];
let id = parseInt(localStorage.getItem("videoAtual"));
let v = videos[id];

if(!v) alert("Vídeo não encontrado");

// Exibe vídeo
document.getElementById("player").src = v.url;
document.getElementById("titulo").innerText = v.titulo;
document.getElementById("canal").innerText = v.nomeDono;

// Like
document.getElementById("likes").innerText = v.likes;
document.getElementById("likeBtn").onclick = ()=>{
  v.likes++;
  document.getElementById("likes").innerText = v.likes;
  localStorage.setItem("videos",JSON.stringify(videos));
};

// Inscrever
let inscreverBtn = document.getElementById("inscreverBtn");
inscreverBtn.onclick = ()=>{
  if(!v.inscritos.includes(usuario)) v.inscritos.push(usuario);
  alert("Inscrito!");
  localStorage.setItem("videos",JSON.stringify(videos));
};

// Comentários
function comentar(){
  let texto = document.getElementById("commentInput").value.trim();
  if(!texto) return;
  v.comentarios.push({usuario,texto});
  localStorage.setItem("videos",JSON.stringify(videos));
  document.getElementById("commentInput").value="";
  carregarComentarios();
}
function carregarComentarios(){
  let div = document.getElementById("comentarios");
  div.innerHTML="";
  v.comentarios.forEach(c=>{
    div.innerHTML += `<div class="comment"><b>${c.usuario}:</b> ${c.texto}</div>`;
  });
}
carregarComentarios();

// Recomendados (outros vídeos)
let recomendados = document.getElementById("recomendados");
videos.forEach((vid,i)=>{
  if(i===id) return;
  recomendados.innerHTML += `<div onclick="abrirVideo(${i})"><video src="${vid.url}" muted></video><p>${vid.titulo}</p><p>${vid.nomeDono}</p></div>`;
});

window.abrirVideo = (i)=>{
  videos[i].views++;
  localStorage.setItem("videos",JSON.stringify(videos));
  localStorage.setItem("videoAtual",i);
  location.reload();
};
</script>
</body>
</html>
</html>
