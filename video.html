<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Datuber - Assistir Vídeo</title>
<style>
  body { background:#0f0f0f; color:#ddd; font-family:Arial, sans-serif; padding:10px; margin:0; }
  .container { display:flex; gap:20px; }
  .video-section { flex:2; }
  .side { flex:1; padding-left:20px; border-left:1px solid #333; }
  video { width:100%; max-height:400px; border:1px solid #333; border-radius:4px; }
  button { background:#e33; border:none; color:white; padding:5px 10px; margin:5px 2px; cursor:pointer; border-radius:3px; }
  .comment { border-top:1px solid #444; padding:5px 0; }
  .recommend { cursor:pointer; margin-bottom:15px; }
  .recommend video { width:100%; height:auto; }
</style>
</head>
<body>

<div class="container">
  <div class="video-section">
    <video id="player" controls></video>
    <h2 id="titulo"></h2>
    <div style="display:flex; align-items:center; gap:10px;">
      <img id="canalFoto" src="" width="40" height="40" style="border-radius:50%; cursor:pointer;">
      <p id="canal" style="cursor:pointer; color:#6cf; font-weight:bold;"></p>
    </div>
    <button id="inscreverBtn">Inscrever</button>
    <button id="likeBtn">Like (<span id="likes">0</span>)</button>
    <h3>Comentários</h3>
    <input id="commentInput" placeholder="Escreva um comentário" style="width:80%; padding:5px; margin-top:5px;">
    <button onclick="comentar()">Postar</button>
    <div id="comentarios"></div>
  </div>
  <div class="side">
    <h3>Recomendados</h3>
    <div id="recomendados"></div>
  </div>
</div>

<script>
// Recupera o usuário logado e os dados de vídeos
let usuario = localStorage.getItem("usuario");
let users = JSON.parse(localStorage.getItem("users") || "[]");
let videos = JSON.parse(localStorage.getItem("videos") || "[]");
let id = parseInt(localStorage.getItem("videoAtual")); 
if (isNaN(id) || !videos[id]) { alert("Vídeo não encontrado."); location.href="index.html"; }
let v = videos[id];

// Preenche player e informações do vídeo
document.getElementById("player").src = v.url;
document.getElementById("titulo").innerText = v.titulo;
document.getElementById("canal").innerText = v.nomeDono;
document.getElementById("canalFoto").src = v.fotoDono;
document.getElementById("likes").innerText = v.likes;

// Botão Like
document.getElementById("likeBtn").onclick = () => {
  v.likes++;
  document.getElementById("likes").innerText = v.likes;
  localStorage.setItem("videos", JSON.stringify(videos));  // atualiza likes
};

// Botão Inscrever
document.getElementById("inscreverBtn").onclick = () => {
  if (!usuario) { alert("Faça login para se inscrever."); return; }
  if (!v.inscritos.includes(usuario)) {
    v.inscritos.push(usuario);
    localStorage.setItem("videos", JSON.stringify(videos));
    alert("Inscrito no canal " + v.nomeDono + "!");
  } else {
    alert("Você já está inscrito.");
  }
};

// Comentários
function carregarComentarios() {
  let div = document.getElementById("comentarios");
  div.innerHTML = "";
  v.comentarios.forEach(c => {
    div.innerHTML += `<div class="comment"><b>${c.usuario}:</b> ${c.texto}</div>`;
  });
}
function comentar() {
  let texto = document.getElementById("commentInput").value.trim();
  if (!usuario) { alert("Faça login para comentar."); return; }
  if (!texto) return;
  v.comentarios.push({usuario:usuario, texto:texto});
  localStorage.setItem("videos", JSON.stringify(videos));
  document.getElementById("commentInput").value = "";
  carregarComentarios();
}
carregarComentarios();

// Recomendações (outros vídeos)
let recDiv = document.getElementById("recomendados");
videos.forEach((vid, i) => {
  if (i === id) return;
  recDiv.innerHTML += `
    <div class="recommend" onclick="abrirVideo(${i})">
      <video src="${vid.url}" muted></video>
      <p>${vid.titulo}</p>
      <p style="font-size:0.9em;color:#bbb">${vid.nomeDono}</p>
    </div>`;
});

// Navegar para o canal ao clicar no nome/foto
function abrirCanal() {
  localStorage.setItem("canalAtual", v.dono);
  window.location.href = "canal.html";
}
document.getElementById("canal").onclick = abrirCanal;
document.getElementById("canalFoto").onclick = abrirCanal;

// Abre outro vídeo recomendado
window.abrirVideo = (i) => {
  videos[i].views = (videos[i].views || 0) + 1;
  localStorage.setItem("videos", JSON.stringify(videos));
  localStorage.setItem("videoAtual", i);
  location.reload();
};
</script>
</body>
</html>
