<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<video id="player" controls width="80%"></video>

<br><br>

<button onclick="like()">👍</button>
<button onclick="dislike()">👎</button>
<button onclick="compartilhar()">🔗</button>

<p id="views"></p>

<h3>Comentários</h3>
<button onclick="comentar()">Comentar</button>
<div id="com"></div>

<script>

let vids = JSON.parse(localStorage.getItem("videos"))||[];
let i = localStorage.getItem("video");

if(!vids[i]){
document.body.innerHTML="Vídeo não encontrado";
}

let v = vids[i];

player.src = v.video;

// VIEW
v.views++;
views.innerText = v.views+" views";

// SALVAR
function salvar(){
localStorage.setItem("videos",JSON.stringify(vids));
}

// LIKE
function like(){
v.likes++;
salvar();
alert("Like!");
}

// DISLIKE
function dislike(){
v.likes--;
salvar();
alert("Dislike!");
}

// COMENTAR
function comentar(){
let txt = prompt("Comentário:");
v.comentarios.push(txt);
salvar();
mostrar();
}

// MOSTRAR COMENT
function mostrar(){
com.innerHTML="";
v.comentarios.forEach(c=>{
com.innerHTML += "<p>"+c+"</p>";
});
}

// COMPARTILHAR
function compartilhar(){
let link = location.href;
navigator.clipboard.writeText(link);
alert("Link copiado!");
}

mostrar();
salvar();

</script>

</body>
</html>
