<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;">

<video id="v" controls width="80%"></video>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || [];
let i = localStorage.getItem("video");

if(videos[i]){
document.getElementById("v").src = videos[i].video;
}else{
document.body.innerHTML = "Vídeo não encontrado";
}

</script>

</body>
</html>
