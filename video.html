<!D<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<video id="player" controls width="100%"></video>

<h2 id="titulo"></h2>
<p id="canal" onclick="irCanal()" style="cursor:pointer;color:cyan;"></p>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || [];
let id = localStorage.getItem("videoAtual");

let v = videos[id];

player.src = v.video;
titulo.innerText = v.titulo;
canal.innerText = v.dono;

// IR CANAL DO VIDEO
function irCanal(){
localStorage.setItem("canalAtual", v.dono);
window.location.href = "canal.html";
}

</script>

</body>
</html>
