<body style="background:#0f0f0f;color:white">

<h1 id="nome"></h1>
<input type="file" id="banner">
<button onclick="salvarBanner()">Salvar Banner</button>

<div id="videos"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase=window.supabase.createClient("SUA_URL","SUA_KEY");
let user=new URLSearchParams(location.search).get("user");

nome.innerText=user;

async function carregar(){
let {data}=await supabase.from("videos").select("*");

videos.innerHTML="";
data.forEach(v=>{
if(v.dono==user){
videos.innerHTML+=`<p>${v.titulo}</p>`;
}
});
}

carregar();
</script>
