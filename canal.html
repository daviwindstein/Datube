<!DOCTYPE html>
<html>
<body style="background:#0f0f0f;color:white;font-family:Arial;">

<h1 id="nome"></h1>

<div id="videos"></div>

<script src="app.js"></script>

<script>

let user = localStorage.getItem("user");

document.getElementById("nome").innerText = user;

let lista = document.getElementById("videos");

videos.forEach((v,i)=>{
if(v.dono === user){
lista.innerHTML+=`
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>
`;
}
});

</script>

</body>
</html>
