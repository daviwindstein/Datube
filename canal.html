<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<h1 id="nome"></h1>

<div id="videos"></div>

<script>

let user = localStorage.getItem("canalAtual") || localStorage.getItem("user");
document.getElementById("nome").innerText = user;

let lista = document.getElementById("videos");
let videos = JSON.parse(localStorage.getItem("videos")) || [];

videos.forEach((v,i)=>{
if(v.dono===user){
lista.innerHTML+=`
<div onclick="abrir(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>`;
}
});

function abrir(i){
localStorage.setItem("videoAtual", i);
window.location="video.html";
}

</script>

</body>
</html>
