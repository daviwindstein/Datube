<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canal</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;}
.videos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
</style>
</head>
<body>

<h1 id="nome"></h1>
<div class="videos" id="videos"></div>

<script>
// PEGAR CANAL
let canal = new URLSearchParams(location.search).get("user");
document.getElementById("nome").innerText = canal;

let videos = JSON.parse(localStorage.getItem("videos")) || [];
const lista = document.getElementById("videos");

videos.forEach((v,i)=>{
  if(v.dono === canal){
    lista.innerHTML += `
      <div class="video" onclick="abrirVideoLocal(${i})">
        <video src="${v.url}" width="300" controls></video>
        <p>${v.titulo}</p>
      </div>`;
  }
});

function abrirVideoLocal(id){
  localStorage.setItem("videoAtual", id);
  window.location.href = "video.html";
}
</script>

</body>
</html>
