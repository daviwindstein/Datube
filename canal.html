<!DOCTYPE html>
<html>
<body style="background:#0f0f0f;color:white;font-family:Arial;">

<!-- BANNER -->
<div style="height:150px;background:#333"></div>

<h1 id="nome"></h1>

<div id="videos"></div>

<script>

let usuario = localStorage.getItem("user") || "Você";
let listaVideos = JSON.parse(localStorage.getItem("videos")) || [];

document.getElementById("nome").innerText = usuario;

let lista = document.getElementById("videos");

listaVideos.forEach((v,i)=>{
if(v.dono === usuario){

lista.innerHTML+=`
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>
`;

}
});

function abrirVideo(id){
localStorage.setItem("videoAtual", id);
window.location.href="video.html";
}

</script>

</body>
</html>
