<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Canal</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;}
.videos{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
</style>
</head>

<body>

<h1 id="nome"></h1>
<p id="inscritos"></p>

<div class="videos" id="videos"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const app = initializeApp({apiKey:"COLE_AQUI", projectId:"COLE_AQUI"});
const db = getFirestore(app);

let canal = new URLSearchParams(location.search).get("user");

nome.innerText = canal;

async function carregar(){
  let q = await getDocs(collection(db,"videos"));

  q.forEach(doc=>{
    let v = doc.data();

    if(v.dono===canal){
      videos.innerHTML+=`
      <div onclick="abrirVideo('${doc.id}')">
        <img src="${v.thumb}" width="100%">
        <p>${v.titulo}</p>
      </div>`;
    }
  });
}

window.abrirVideo = (id)=>{
  location.href="video.html?id="+id;
}

carregar();

</script>

</body>
</html>
