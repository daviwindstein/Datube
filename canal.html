<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<h2>Meu Canal</h2>
<img id="foto" width="80">

<div id="videos"></div>

<script>

let user = localStorage.getItem("user");
let vids = JSON.parse(localStorage.getItem("videos"))||[];

vids.forEach(v=>{
if(v.user==user){
videos.innerHTML += "<p>"+v.titulo+"</p>";
}
});

</script>

</body>
</html>
