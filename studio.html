<!DOCTYPE html>
<html>
<body style="background:#0f0f0f;color:white;font-family:Arial;">

<h1>📊 Studio</h1>

<div id="videos"></div>

<script src="app.js"></script>

<script>

let user = localStorage.getItem("user");
let div = document.getElementById("videos");

videos.forEach((v,i)=>{
if(v.dono === user){

div.innerHTML+=`
<div>
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>

<button onclick="editar(${i})">✏️</button>
<button onclick="deletar(${i})">🗑️</button>

</div>
`;
}
});

function editar(i){
let n = prompt("Novo título:");
videos[i].titulo = n;
salvar();
location.reload();
}

function deletar(i){
videos.splice(i,1);
salvar();
location.reload();
}

</script>

</body>
</html>
