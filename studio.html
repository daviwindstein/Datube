<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<h2>Studio</h2>

<p id="v"></p>
<p id="l"></p>

<script>

let user = localStorage.getItem("user");
let vids = JSON.parse(localStorage.getItem("videos"))||[];

let views=0;
let likes=0;

vids.forEach(x=>{
if(x.user==user){
views+=x.views;
likes+=x.likes;
}
});

document.getElementById("v").innerText="Views: "+views;
document.getElementById("l").innerText="Likes: "+likes;

</script>

</body>
</html>
