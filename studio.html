<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<h2>Studio</h2>

<p id="views"></p>
<p id="videos"></p>

<script>

let user=localStorage.getItem("user");
let vids=JSON.parse(localStorage.getItem("videos"))||[];

let v=0;
let total=0;

vids.forEach(x=>{
if(x.user==user){
v+=x.views;
total++;
}
});

views.innerText="Views: "+v;
videos.innerText="Vídeos: "+total;

</script>
</body>
</html>
