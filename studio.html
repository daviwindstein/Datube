<!DOCTYPE html>
<html>
<body style="background:#111;color:white;">

<h1>Studio</h1>

<div id="videos"></div>

<script>

let user = localStorage.getItem("user");
let lista = document.getElementById("videos");
let videos = JSON.parse(localStorage.getItem("videos")) || [];

videos.forEach((v,i)=>{
if(v.dono===user){
lista.innerHTML+=`
<div>
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
<button onclick="edit(${i})">✏️</button>
<button onclick="del(${i})">🗑️</button>
</div>`;
}
});

function edit(i){
let n = prompt("Novo título:");
videos[i].titulo=n;
localStorage.setItem("videos", JSON.stringify(videos));
location.reload();
}

function del(i){
videos.splice(i,1);
localStorage.setItem("videos", JSON.stringify(videos));
location.reload();
}

</script>

</body>
</html>
