<!DOCTYPE html>
<html>
<body style="background:black;">

<div id="shorts"></div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || [];
let div = document.getElementById("shorts");

videos.forEach(v=>{
div.innerHTML+=`
<video src="${v.video}" controls style="height:100vh;width:100%"></video>`;
});
