<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shorts</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

#container{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.short{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
position:relative;
scroll-snap-align:start;
}

video{
height:100%;
max-width:100%;
}

.info{
position:absolute;
bottom:20px;
left:10px;
}

.botoes{
position:absolute;
right:10px;
bottom:50px;
display:flex;
flex-direction:column;
gap:10px;
}

button{
background:red;
border:none;
color:white;
padding:10px;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<div id="container"></div>

<script>

let videos = JSON.parse(localStorage.getItem("videos")) || [];

let container = document.getElementById("container");

// 🔥 PEGAR SÓ VÍDEOS CURTOS (até 60s)
videos.forEach((v,i)=>{

container.innerHTML += `
<div class="short">
<video src="${v.video}" autoplay loop muted></video>

<div class="info">
<p>${v.titulo}</p>
<p>${v.dono}</p>
</div>

<div class="botoes">
<button onclick="like(${i})">❤️</button>
<button onclick="comentar(${i})">💬</button>
</div>

</div>
`;

});

// ❤️ LIKE
function like(i){
videos[i].likes++;
localStorage.setItem("videos", JSON.stringify(videos));
alert("Like!");
}

// 💬 COMENTAR
function comentar(i){
let c = prompt("Comentário:");
videos[i].comentarios.push(c);
localStorage.setItem("videos", JSON.stringify(videos));
}

</script>

</body>
</html>
