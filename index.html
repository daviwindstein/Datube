<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="background:#111;color:white;font-family:Arial;">

<header style="display:flex;justify-content:space-between;background:#202020;padding:10px;">

<h2>📺 Datuber</h2>

<div>
<img id="fotoPerfil" onclick="abrirMenu()" style="width:40px;height:40px;border-radius:50%;cursor:pointer;">
</div>

</header>

<!-- MENU -->
<div id="menu" style="display:none;background:#222;padding:10px;position:absolute;right:10px;">
<p onclick="login()">👤 Login</p>
<p onclick="mudarFoto()">🖼️ Mudar foto</p>
<p onclick="mudarNome()">✏️ Mudar nome</p>
<p onclick="irCanal()">📺 Meu canal</p>
</div>

<hr>

<input id="titulo" placeholder="Título"><br><br>
<input type="file" id="videoFile"><br><br>
<input type="file" id="thumbFile"><br><br>

<button onclick="postar()">POSTAR</button>

<h2>Vídeos</h2>
<div id="videos"></div>

<script>

// 👤 USUÁRIO
let user = localStorage.getItem("user") || "Você";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";

// SET FOTO
document.getElementById("fotoPerfil").src = foto;

// MENU
function abrirMenu(){
let m = document.getElementById("menu");
m.style.display = m.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let nome = prompt("Seu nome:");
localStorage.setItem("user", nome);
location.reload();
}

// MUDAR FOTO
function mudarFoto(){
let input = document.createElement("input");
input.type="file";

input.onchange = () => {
let reader = new FileReader();
reader.onload = () => {
localStorage.setItem("foto", reader.result);
location.reload();
}
reader.readAsDataURL(input.files[0]);
}
input.click();
}

// MUDAR NOME
function mudarNome(){
let nome = prompt("Novo nome:");
localStorage.setItem("user", nome);
location.reload();
}

// IR CANAL
function irCanal(){
window.location.href = "canal.html";
}

// 🎥 VIDEOS
let videos = JSON.parse(localStorage.getItem("videos")) || [];

// POSTAR
function postar(){

let v = videoFile.files[0];
let t = thumbFile.files[0];
let titulo = document.getElementById("titulo").value;

if(!v || !t || !titulo){
alert("Preencha tudo!");
return;
}

let rv = new FileReader();
let rt = new FileReader();

rv.onload = () => {
rt.onload = () => {

videos.unshift({
titulo,
video: rv.result,
thumb: rt.result,
dono: user
});

localStorage.setItem("videos", JSON.stringify(videos));

alert("Postado!");
carregar();

}
rt.readAsDataURL(t);
}
rv.readAsDataURL(v);
}

// CARREGAR
function carregar(){

videos = JSON.parse(localStorage.getItem("videos")) || [];

let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{
lista.innerHTML += `
<div onclick="abrir(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
<p>${v.dono}</p>
</div>
`;
});
}

// ABRIR VIDEO
function abrir(i){
localStorage.setItem("videoAtual", i);
window.location.href="video.html";
}

carregar();

</script>

</body>
</html>
