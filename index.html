<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;align-items:center;">
<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div style="display:flex;gap:10px;">
<button onclick="abrirCriar()">➕</button>
<button onclick="mudarIdioma()">🌐</button>
<img id="fotoPerfil" onclick="abrirMenu()" style="width:40px;height:40px;border-radius:50%;cursor:pointer;">
</div>
</div>

<!-- MENU PERFIL -->
<div id="menuPerfil" style="display:none;position:absolute;right:10px;background:#222;padding:10px;">
<p onclick="login()">Login</p>
<p onclick="mudarFoto()">Foto</p>
</div>

<!-- MENU CRIAR -->
<div id="menuCriar" style="display:none;background:#222;padding:10px;">
<button onclick="criarVideo()">🎥 Postar Vídeo</button>
</div>

<hr>

<!-- FEED -->
<div id="feed"></div>

<script>

// 👤 USER
let user = localStorage.getItem("user") || "Você";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";
document.getElementById("fotoPerfil").src = foto;

// MENU
function abrirMenu(){
menuPerfil.style.display = menuPerfil.style.display=="block"?"none":"block";
}
function abrirCriar(){
menuCriar.style.display = menuCriar.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let n = prompt("Nome:");
localStorage.setItem("user", n);
location.reload();
}

// FOTO
function mudarFoto(){
let i = document.createElement("input");
i.type="file";
i.onchange=()=>{
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("foto",r.result);
location.reload();
}
r.readAsDataURL(i.files[0]);
}
i.click();
}

// IDIOMA
function mudarIdioma(){
alert("Idioma trocado (demo)");
}

// BASE
function getVideos(){
return JSON.parse(localStorage.getItem("videos")) || [];
}

// 🎥 POSTAR VIDEO (FUNCIONANDO)
function criarVideo(){

let v = document.createElement("input");
v.type="file"; v.accept="video/*";

let t = document.createElement("input");
t.type="file"; t.accept="image/*";

v.click();

v.onchange=()=>{

if(!v.files[0]) return;

t.click();

t.onchange=()=>{

let titulo = prompt("Título:");
let desc = prompt("Descrição:");

let rv = new FileReader();
let rt = new FileReader();

rv.onload=()=>{
rt.onload=()=>{

let videos = getVideos();

videos.unshift({
titulo,
desc,
video:rv.result,
thumb:rt.result,
dono:user
});

localStorage.setItem("videos",JSON.stringify(videos));

alert("Vídeo postado!");
carregar();

}

rt.readAsDataURL(t.files[0]);
}
rv.readAsDataURL(v.files[0]);

}
}
}

// 🔥 CARREGAR VIDEOS (PÁGINA INICIAL)
function carregar(){

let feed = document.getElementById("feed");
let lista = getVideos();

feed.innerHTML="";

if(lista.length === 0){
feed.innerHTML = "<p>Nenhum vídeo ainda</p>";
return;
}

lista.forEach((v,i)=>{
feed.innerHTML += `
<div onclick="abrirVideo(${i})" style="margin:10px;cursor:pointer;">
<img src="${v.thumb}" width="300">
<h3>${v.titulo}</h3>
<p>${v.dono}</p>
</div>
`;
});

}

// 🔍 PESQUISA
document.getElementById("pesquisa").oninput = (e)=>{
let termo = e.target.value.toLowerCase();
let lista = getVideos();
let feed = document.getElementById("feed");

feed.innerHTML="";

lista.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(termo)){
feed.innerHTML += `
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="300">
<p>${v.titulo}</p>
</div>
`;
}
});
}

// ▶ ABRIR VIDEO
function abrirVideo(i){
localStorage.setItem("videoAtual",i);
location="video.html";
}

// START
carregar();

</script>

</body>
</html>
