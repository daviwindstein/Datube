<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>
<style>
body{background:#0f0f0f;color:white;font-family:Arial;margin:0;}
header{display:flex;justify-content:space-between;padding:10px;background:#202020;}
input, button{padding:5px;margin:2px;}
#videos{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:10px;}
.video{cursor:pointer;background:#181818;padding:5px;border-radius:10px;}
.video img, .video video{width:100%;border-radius:10px;}
.login-box{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
background:#202020;padding:20px;display:none;flex-direction:column;}
</style>
</head>
<body>

<header>
<h2>📺 Datuber</h2>
<input id="pesquisa" placeholder="Pesquisar...">
<div>
<button onclick="abrirLogin()">Login</button>
<button onclick="abrirPerfil()">Meu Canal</button>
<input type="file" id="videoInput" accept="video/*">
<input type="file" id="thumbInput" accept="image/*">
<button onclick="uploadVideo()">Postar</button>
</div>
</header>

<div id="videos"></div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">
<button onclick="fazerLogin()">Entrar</button>
<button onclick="criarConta()">Criar Conta</button>
<button onclick="fecharLogin()">Fechar</button>
</div>

<script>
// --- CONFIGURAÇÃO DO BANCO ---
let db;
const request = indexedDB.open("DatuberDB",1);
request.onupgradeneeded = e=>{
  db = e.target.result;
  if(!db.objectStoreNames.contains("videos")) db.createObjectStore("videos",{keyPath:"id",autoIncrement:true});
  if(!db.objectStoreNames.contains("usuarios")) db.createObjectStore("usuarios",{keyPath:"username"});
};
request.onsuccess = e=>{
  db = e.target.result;
  carregarVideos();
};

// --- LOGIN ---
let usuario = localStorage.getItem("usuario");
function abrirLogin(){document.getElementById("loginBox").style.display="flex";}
function fecharLogin(){document.getElementById("loginBox").style.display="none";}

function criarConta(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();
  if(!u||!p) return alert("Preencha tudo!");
  const tx = db.transaction(["usuarios"],"readwrite");
  const store = tx.objectStore("usuarios");
  const req = store.get(u);
  req.onsuccess = ()=>{
    if(req.result) return alert("Usuário já existe!");
    store.add({username:u,password:p,foto:"",inscritos:0});
    alert("Conta criada!");
  }
}

function fazerLogin(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();
  if(!u||!p) return alert("Preencha tudo!");
  const tx = db.transaction(["usuarios"],"readonly");
  const store = tx.objectStore("usuarios");
  const req = store.get(u);
  req.onsuccess = ()=>{
    if(req.result && req.result.password===p){
      usuario=u;
      localStorage.setItem("usuario",usuario);
      fecharLogin();
      alert("Logado como "+usuario);
      carregarVideos();
    } else alert("Usuário ou senha incorretos!");
  }
}

// --- UPLOAD DE VÍDEO ---
function uploadVideo(){
  if(!usuario) return alert("Faça login!");
  const videoFile = document.getElementById("videoInput").files[0];
  const thumbFile = document.getElementById("thumbInput").files[0];
  if(!videoFile || !thumbFile) return alert("Escolha vídeo e thumbnail!");

  if(videoFile.size>3e9) return alert("Máximo 1 hora de vídeo!");
  const titulo = prompt("Título do vídeo:");
  if(!titulo) return alert("Necessário título!");

  const readerVideo = new FileReader();
  const readerThumb = new FileReader();

  readerVideo.onload = ()=>{
    const videoData = readerVideo.result;
    readerThumb.onload = ()=>{
      const thumbData = readerThumb.result;
      const tx = db.transaction(["videos"],"readwrite");
      const store = tx.objectStore("videos");
      store.add({
        titulo,
        video: videoData,
        thumb: thumbData,
        dono: usuario,
        data: Date.now(),
        likes:0,
        comentarios:[]
      });
      tx.oncomplete = ()=>carregarVideos();
    }
    readerThumb.readAsDataURL(thumbFile);
  }
  readerVideo.readAsArrayBuffer(videoFile);
}

// --- CARREGAR VÍDEOS ---
function carregarVideos(){
  const container = document.getElementById("videos");
  container.innerHTML="";
  const tx = db.transaction(["videos"],"readonly");
  const store = tx.objectStore("videos");
  const requestCursor = store.openCursor(null,"prev"); // mais recentes primeiro
  requestCursor.onsuccess = e=>{
    const cursor = e.target.result;
    if(cursor){
      const v = cursor.value;
      const blob = new Blob([v.video],{type:"video/mp4"});
      const url = URL.createObjectURL(blob);
      container.innerHTML+=`
      <div class="video" onclick="abrirVideo(${v.id})">
        <img src="${v.thumb}">
        <p>${v.titulo}</p>
        <p>${v.dono}</p>
      </div>
      `;
      cursor.continue();
    }
  }
}

// --- ABRIR VIDEO ---
function abrirVideo(id){
  localStorage.setItem("videoAtual",id);
  window.location.href="video.html";
}

// --- ABRIR PERFIL ---
function abrirPerfil(){
  if(!usuario) return alert("Faça login!");
  window.location.href="canal.html?user="+usuario;
}

// --- PESQUISA ---
document.getElementById("pesquisa").oninput = e=>{
  const termo = e.target.value.toLowerCase();
  const container = document.getElementById("videos");
  container.innerHTML="";
  const tx = db.transaction(["videos"],"readonly");
  const store = tx.objectStore("videos");
  const req = store.openCursor(null,"prev");
  req.onsuccess = e=>{
    const cursor = e.target.result;
    if(cursor){
      const v = cursor.value;
      if(v.titulo.toLowerCase().includes(termo)){
        const blob = new Blob([v.video],{type:"video/mp4"});
        const url = URL.createObjectURL(blob);
        container.innerHTML+=`
        <div class="video" onclick="abrirVideo(${v.id})">
          <img src="${v.thumb}">
          <p>${v.titulo}</p>
          <p>${v.dono}</p>
        </div>`;
      }
      cursor.continue();
    }
  }
}
</script>
</body>
</html>
