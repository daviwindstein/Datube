<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="background:#111;color:white;font-family:Arial;">

<h2>📺 Datuber</h2>

<button onclick="postar()">Postar vídeo</button>

<hr>

<div id="feed"></div>

<script>

// PEGAR VIDEOS
function getVideos(){
return JSON.parse(localStorage.getItem("videos")) || [];
}

// SALVAR
function setVideos(v){
localStorage.setItem("videos", JSON.stringify(v));
}

// POSTAR VIDEO (FUNCIONA MESMO)
function postar(){

let input = document.createElement("input");
input.type="file";
input.accept="video/*";

input.onchange = () => {

let file = input.files[0];
if(!file) return;

let titulo = prompt("Título:");

let url = URL.createObjectURL(file);

let videos = getVideos();

videos.unshift({
titulo: titulo,
video: url,
views: 0
});

setVideos(videos);

alert("Vídeo postado!");
carregar();

};

input.click();
}

// MOSTRAR VIDEOS
function carregar(){

let feed = document.getElementById("feed");
let videos = getVideos();

feed.innerHTML = "";

if(videos.length === 0){
feed.innerHTML = "<p>Nenhum vídeo ainda</p>";
return;
}

videos.forEach((v,i)=>{
feed.innerHTML += `
<div onclick="abrir(${i})" style="margin:20px;cursor:pointer;">
<p>${v.titulo}</p>
<video src="${v.video}" width="250"></video>
</div>
`;
});
}

// ABRIR VIDEO
function abrir(i){
localStorage.setItem("video", i);
location = "video.html";
}

carregar();

</script>

</body>
</html>
