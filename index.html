<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>
<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }
header { display:flex; justify-content:space-between; padding:10px; background:#202020; }
input { padding:5px; }
#videos { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:10px; }
.video { cursor:pointer; border:1px solid #333; padding:5px; border-radius:5px; }
.login-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#202020; padding:20px; display:none; flex-direction:column; }
button { background:red; border:none; color:white; padding:5px; margin:2px; cursor:pointer; }
</style>
</head>
<body>

<header>
  <h2>📺 Datuber</h2>
  <input id="pesquisa" placeholder="Pesquisar...">
  <div>
    <button onclick="abrirLogin()">Login</button>
    <button onclick="uploadVideo()">Postar</button>
  </div>
</header>

<div id="videos"></div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button onclick="fazerLogin()">Entrar</button>
  <button onclick="criarConta()">Criar Conta</button>
  <button onclick="fecharLogin()">Fechar</button>
</div>

<script>
// ======= LOGIN SIMPLES LOCAL =======
let usuario = localStorage.getItem("user") || null;

function abrirLogin(){ document.getElementById("loginBox").style.display="flex"; }
function fecharLogin(){ document.getElementById("loginBox").style.display="none"; }

function criarConta(){
  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value.trim();
  if(!user || !pass){ alert("Preencha tudo!"); return; }

  let users = JSON.parse(localStorage.getItem("users")) || [];
  if(users.find(u=>u.username===user)){ alert("Usuário já existe!"); return; }

  users.push({username:user, password:pass});
  localStorage.setItem("users", JSON.stringify(users));
  alert("Conta criada!");
}

function fazerLogin(){
  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value.trim();
  let users = JSON.parse(localStorage.getItem("users")) || [];
  let u = users.find(u=>u.username===user && u.password===pass);
  if(u){ usuario=user; localStorage.setItem("user",usuario); fecharLogin(); alert("Logado!"); carregarVideos(); }
  else alert("Usuário ou senha incorretos!");
}

// ======= UPLOAD DE VÍDEO DO PC =======
function uploadVideo(){
  if(!usuario){ alert("Faça login para postar!"); return; }

  let input = document.createElement("input");
  input.type="file"; input.accept="video/*"; input.click();

  input.onchange = ()=>{
    let file = input.files[0];
    if(!file){ alert("Nenhum vídeo selecionado!"); return; }

    let titulo = prompt("Título do vídeo:");
    if(!titulo) titulo="Sem título";

    let reader = new FileReader();
    reader.onload = ()=>{
      let url = reader.result;

      let videos = JSON.parse(localStorage.getItem("videos")) || [];
      videos.push({titulo:titulo, url:url, dono:usuario});
      localStorage.setItem("videos", JSON.stringify(videos));

      carregarVideos();
      alert("Vídeo postado com sucesso!");
    }
    reader.readAsDataURL(file);
  }
}

// ======= CARREGAR VÍDEOS =======
function carregarVideos(){
  const lista = document.getElementById("videos");
  lista.innerHTML="";

  let videos = JSON.parse(localStorage.getItem("videos")) || [];

  videos.forEach((v,i)=>{
    lista.innerHTML += `
      <div class="video" onclick="abrirVideo(${i})">
        <video src="${v.url}" width="300" controls></video>
        <p><b>${v.titulo}</b></p>
        <p>${v.dono}</p>
      </div>
    `;
  });
}

// ======= PESQUISA =======
document.getElementById("pesquisa").addEventListener("input",(e)=>{
  const termo = e.target.value.toLowerCase();
  const lista = document.getElementById("videos");
  lista.innerHTML="";
  let videos = JSON.parse(localStorage.getItem("videos")) || [];
  videos.forEach((v,i)=>{
    if(v.titulo.toLowerCase().includes(termo)){
      lista.innerHTML += `
        <div class="video" onclick="abrirVideo(${i})">
          <video src="${v.url}" width="300" controls></video>
          <p><b>${v.titulo}</b></p>
          <p>${v.dono}</p>
        </div>
      `;
    }
  });
});

// ======= ABRIR VIDEO NA PAGINA video.html =======
function abrirVideo(id){
  localStorage.setItem("videoAtual", id);
  window.location.href="video.html";
}

// ======= INICIAR =======
window.addEventListener("load", carregarVideos);
</script>

</body>
</html>
