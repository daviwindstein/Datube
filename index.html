<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;align-items:center;">

<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div style="display:flex;gap:10px;align-items:center;">
<button onclick="abrirCriar()">➕</button>
<img id="fotoPerfil" onclick="abrirMenu()" style="width:40px;height:40px;border-radius:50%;cursor:pointer;">
</div>

</div>

<!-- MENU PERFIL -->
<div id="menuPerfil" style="display:none;position:absolute;right:10px;background:#222;padding:10px;">
<p onclick="login()">Login</p>
</div>

<!-- MENU CRIAR -->
<div id="menuCriar" style="display:none;background:#222;padding:10px;">
<button onclick="criarVideo()">🎥 Vídeo</button>
<button onclick="criarShort()">🎬 Shorts</button>
</div>

<hr>

<div id="feed"></div>

<script>

// 👤 USER
let user = localStorage.getItem("user") || "Você";
document.getElementById("fotoPerfil").src = "https://via.placeholder.com/40";

// MENU
function abrirMenu(){
menuPerfil.style.display = menuPerfil.style.display=="block"?"none":"block";
}
function abrirCriar(){
menuCriar.style.display = menuCriar.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let n = prompt("Nome:");
localStorage.setItem("user", n);
location.reload();
}

// BASE
let videos = JSON.parse(localStorage.getItem("videos")) || [];
let shorts = JSON.parse(localStorage.getItem("shorts")) || [];

// 🔥 VIDEO (USANDO SCRIPT QUE FUNCIONA)
function criarVideo(){

let inputVideo = document.createElement("input");
inputVideo.type = "file";
inputVideo.accept = "video/*";

let inputThumb = document.createElement("input");
inputThumb.type = "file";
inputThumb.accept = "image/*";

inputVideo.click();

inputVideo.onchange = () => {

if(!inputVideo.files[0]) return;

inputThumb.click();

inputThumb.onchange = () => {

let titulo = prompt("Título:");
let desc = prompt("Descrição:");

let readerVideo = new FileReader();
let readerThumb = new FileReader();

readerVideo.onload = () => {
readerThumb.onload = () => {

let novoVideo = {
titulo,
desc,
video: readerVideo.result,
thumb: readerThumb.result,
likes: 0,
comentarios: []
};

videos.unshift(novoVideo);

// SALVAR CERTO
localStorage.setItem("videos", JSON.stringify(videos));

// 🔥 ATUALIZA NA HORA
carregarVideos();

alert("Vídeo postado!");

}

readerThumb.readAsDataURL(inputThumb.files[0]);
}

readerVideo.readAsDataURL(inputVideo.files[0]);

}

}

// 🎬 SHORTS
function criarShort(){

let input = document.createElement("input");
input.type="file";
input.accept="video/*";

input.click();

input.onchange=()=>{

let r=new FileReader();

r.onload=()=>{
shorts.unshift({video:r.result});
localStorage.setItem("shorts",JSON.stringify(shorts));
alert("Short postado!");
}

r.readAsDataURL(input.files[0]);

}

}

// 🔥 CARREGAR (CORRIGIDO REAL)
function carregarVideos(){

let feed = document.getElementById("feed");
feed.innerHTML = "";

let lista = JSON.parse(localStorage.getItem("videos")) || [];

if(lista.length === 0){
feed.innerHTML = "<p>Nenhum vídeo ainda</p>";
return;
}

lista.forEach((v, i) => {

feed.innerHTML += `
<div onclick="abrirVideo(${i})" style="cursor:pointer;margin:10px;">
<img src="${v.thumb}" width="300">
<h3>${v.titulo}</h3>
</div>
`;

});

}

// 🔍 PESQUISA
document.getElementById("pesquisa").oninput = (e) => {

let termo = e.target.value.toLowerCase();
let lista = JSON.parse(localStorage.getItem("videos")) || [];

feed.innerHTML = "";

lista.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(termo)){
feed.innerHTML += `
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="300">
<p>${v.titulo}</p>
</div>`;
}
});

}

// ▶ ABRIR VIDEO
function abrirVideo(i){
localStorage.setItem("videoAtual", i);
window.location = "video.html";
}

// START
carregarVideos();

</script>

</body>
</html>
