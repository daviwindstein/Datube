<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;align-items:center;">

<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div style="display:flex;gap:10px;align-items:center;">
<button onclick="abrirCriar()">➕</button>
<button onclick="mudarIdioma()">🌐</button>
<img id="fotoPerfil" onclick="abrirMenu()" style="width:40px;height:40px;border-radius:50%;cursor:pointer;">
</div>

</div>

<!-- MENU PERFIL -->
<div id="menuPerfil" style="display:none;position:absolute;right:10px;background:#222;padding:10px;">
<p onclick="login()">Login</p>
<p onclick="mudarFoto()">Foto</p>
<p onclick="irCanal()">Canal</p>
<p onclick="irStudio()">Studio</p>
</div>

<!-- MENU CRIAR -->
<div id="menuCriar" style="display:none;background:#222;padding:10px;">
<button onclick="criarVideo()">🎥 Postar Vídeo</button>
<button onclick="criarShort()">🎬 Shorts</button>
<button onclick="abrirLive()">🔴 Live</button>
<button onclick="criarPost()">📝 Postagem</button>
</div>

<!-- MENU LATERAL -->
<div style="position:fixed;left:0;top:50%;transform:translateY(-50%);">
<button onclick="home()">🏠</button><br>
<button onclick="irShorts()">🎬</button><br>
<button onclick="abrirLive()">🔴</button>
</div>

<hr>

<div id="feed"></div>

<script>

// USER
let user = localStorage.getItem("user") || "Você";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";
fotoPerfil.src = foto;

// MENU
function abrirMenu(){
menuPerfil.style.display = menuPerfil.style.display=="block"?"none":"block";
}
function abrirCriar(){
menuCriar.style.display = menuCriar.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let n = prompt("Nome:");
localStorage.setItem("user", n);
location.reload();
}

// FOTO
function mudarFoto(){
let i = document.createElement("input");
i.type="file";
i.onchange=()=>{
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("foto",r.result);
location.reload();
}
r.readAsDataURL(i.files[0]);
}
i.click();
}

// IDIOMA
function mudarIdioma(){
let l = localStorage.getItem("lang")||"pt";
l = l=="pt"?"en":l=="en"?"es":"pt";
localStorage.setItem("lang",l);
alert("Idioma: "+l);
}

// NAV
function irCanal(){ location="canal.html"; }
function irStudio(){ location="studio.html"; }
function abrirLive(){ location="live.html"; }
function irShorts(){ location="shorts.html"; }
function home(){ location.reload(); }

// BASE
let videos = JSON.parse(localStorage.getItem("videos"))||[];
let shorts = JSON.parse(localStorage.getItem("shorts"))||[];
let posts = JSON.parse(localStorage.getItem("posts"))||[];

// 🎥 CRIAR VIDEO COMPLETO
function criarVideo(){

let v = document.createElement("input");
v.type="file"; v.accept="video/*";

let t = document.createElement("input");
t.type="file"; t.accept="image/*";

v.click();

v.onchange=()=>{
t.click();

t.onchange=()=>{

let titulo = prompt("Título:");
let desc = prompt("Descrição:");

let rv = new FileReader();
let rt = new FileReader();

rv.onload=()=>{
rt.onload=()=>{

videos.unshift({
tipo:"video",
titulo,
desc,
video:rv.result,
thumb:rt.result,
dono:user
});

localStorage.setItem("videos",JSON.stringify(videos));
carregar();

}
rt.readAsDataURL(t.files[0]);
}
rv.readAsDataURL(v.files[0]);

}
}
}

// 🎬 SHORTS (até 60s)
function criarShort(){

let v=document.createElement("input");
v.type="file"; v.accept="video/*";

v.click();

v.onchange=()=>{

let file = v.files[0];

let r=new FileReader();

r.onload=()=>{
shorts.unshift({
video:r.result
});
localStorage.setItem("shorts",JSON.stringify(shorts));
}

r.readAsDataURL(file);

}
}

// 📝 POST
function criarPost(){
let texto = prompt("Escreva algo:");
posts.unshift({texto});
localStorage.setItem("posts",JSON.stringify(posts));
carregar();
}

// FEED (APENAS VIDEOS)
function carregar(){
feed.innerHTML="";

videos.forEach((v,i)=>{
feed.innerHTML+=`
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>`;
});
}

// PESQUISA
pesquisa.oninput=(e)=>{
let t=e.target.value.toLowerCase();
feed.innerHTML="";

videos.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(t)){
feed.innerHTML+=`
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>`;
}
});
}

// ABRIR VIDEO
function abrirVideo(i){
localStorage.setItem("videoAtual",i);
location="video.html";
}

carregar();

</script>

</body>
</html>
