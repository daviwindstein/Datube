<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#202020;
}

#videos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:10px;
padding:10px;
}

.video{
background:#1c1c1c;
padding:5px;
border-radius:10px;
cursor:pointer;
}

video{width:100%;}

button{background:red;color:white;border:none;padding:5px;margin:2px;cursor:pointer;}

.perfil{
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;
}

.menu{
position:absolute;
right:10px;
top:60px;
background:#202020;
padding:10px;
display:none;
}

</style>
</head>

<body>

<header>

<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div>
<button onclick="abrirUpload()">📤</button>
<button onclick="iniciarLive()">🔴</button>

<!-- FOTO DO CANAL -->
<img id="fotoPerfil" class="perfil" onclick="abrirMenu()">
</div>

</header>

<!-- MENU DO PERFIL -->
<div id="menu" class="menu">
<p onclick="login()">Login</p>
<p onclick="mudarFoto()">Mudar foto</p>
<p onclick="irCanal()">Meu canal</p>
<p onclick="logout()">Sair</p>
</div>

<!-- UPLOAD -->
<div id="uploadBox" style="display:none;padding:10px;">
<input type="file" id="videoFile" accept="video/*"><br><br>
<input id="titulo" placeholder="Título"><br><br>
<button onclick="postarVideo()">POSTAR</button>
</div>

<div id="videos"></div>

<script>

// 👤 USUÁRIO
let usuario = localStorage.getItem("user") || "Convidado";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";

// SET FOTO
document.getElementById("fotoPerfil").src = foto;

// MENU
window.abrirMenu = () => {
let m = document.getElementById("menu");
m.style.display = m.style.display=="block"?"none":"block";
}

// LOGIN
window.login = () => {
let nome = prompt("Nome:");
localStorage.setItem("user", nome);
location.reload();
}

// LOGOUT
window.logout = () => {
localStorage.removeItem("user");
alert("Saiu!");
location.reload();
}

// MUDAR FOTO
window.mudarFoto = () => {
let input = document.createElement("input");
input.type="file";
input.accept="image/*";

input.onchange = () => {
let reader = new FileReader();

reader.onload = () => {
localStorage.setItem("foto", reader.result);
location.reload();
}

reader.readAsDataURL(input.files[0]);
}

input.click();
}

// IR CANAL
window.irCanal = () => {
alert("Aqui vai ser seu canal (posso fazer completo depois)");
}

// 🔥 BANCO
let videos = JSON.parse(localStorage.getItem("videos")) || [];

// UPLOAD
window.abrirUpload = () => {
document.getElementById("uploadBox").style.display="block";
}

// POSTAR
window.postarVideo = () => {

let file = videoFile.files[0];
let titulo = document.getElementById("titulo").value;

if(!file || !titulo){
alert("Preencha tudo!");
return;
}

let reader = new FileReader();

reader.onload = () => {

videos.unshift({
titulo,
url: reader.result,
dono: usuario,
views:0,
likes:0,
comentarios:[]
});

localStorage.setItem("videos", JSON.stringify(videos));

alert("Postado!");
carregarVideos();
}

reader.readAsDataURL(file);
}

// CARREGAR
function carregarVideos(){

let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{

lista.innerHTML+=`
<div class="video" onclick="abrirVideo(${i})">
<video src="${v.url}"></video>
<p>${v.titulo}</p>
<p>${v.dono}</p>
<p>👁️ ${v.views} ❤️ ${v.likes}</p>
</div>
`;

});
}

// PESQUISA
pesquisa.oninput = (e)=>{
let termo = e.target.value.toLowerCase();

let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(termo)){
lista.innerHTML+=`
<div class="video" onclick="abrirVideo(${i})">
<video src="${v.url}"></video>
<p>${v.titulo}</p>
</div>`;
}
});
}

// ABRIR VÍDEO
window.abrirVideo = (id)=>{
localStorage.setItem("videoAtual", id);
window.location.href="video.html";
}

// 🔴 LIVE
window.iniciarLive = async () => {

let stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});

let nova = window.open("");

nova.document.write(`
<h2>🔴 AO VIVO</h2>
<video autoplay id="live"></video>

<input id="msg">
<button onclick="enviar()">Enviar</button>

<div id="chat"></div>

<script>
let video = document.getElementById("live");
video.srcObject = opener.streamRef;

function enviar(){
let m = document.getElementById("msg").value;
document.getElementById("chat").innerHTML += "<p>"+m+"</p>";
}
<\/script>
`);

window.streamRef = stream;
}

carregarVideos();

</script>

</body>
</html>
