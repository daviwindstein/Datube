<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}

header{
<div style="display:flex;align-items:center;gap:10px;">

<button onclick="abrirUpload()">📤</button>
<button onclick="iniciarLive()">🔴</button>
<button onclick="abrirShorts()">🎬</button>

<!-- FOTO DO CANAL -->
<img id="fotoPerfil" src="https://via.placeholder.com/40" 
style="width:40px;height:40px;border-radius:50%;cursor:pointer;"
onclick="toggleMenu()">

</div>
}

#videos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:10px;
padding:10px;
}

.video{
background:#1c1c1c;
padding:5px;
border-radius:10px;
cursor:pointer;
}

.thumb{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

button{background:red;color:white;border:none;padding:5px;}
</style>
</head>

<body>

<header>
<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<button onclick="abrirUpload()">Postar</button>
<button onclick="irCanal()">Meu Canal</button>
</header>
  <button onclick="abrirShorts()">🎬 Shorts</button>

<!-- UPLOAD -->
<div id="uploadBox" style="display:none;padding:10px;">
<input type="file" id="videoFile" accept="video/*"><br><br>
<input type="file" id="thumbFile" accept="image/*"><br><br>
<input id="titulo" placeholder="Título"><br><br>
<button onclick="postarVideo()">POSTAR</button>
</div>
  <label>
<input type="checkbox" id="isShort"> É Short (vídeo curto)
</label>

<div id="videos"></div>

<script>

let usuario = localStorage.getItem("user") || "Você";

// 🔥 BANCO
let videos = JSON.parse(localStorage.getItem("videos")) || [];

// ABRIR UPLOAD
function abrirUpload(){
document.getElementById("uploadBox").style.display="block";
}

// 🚀 POSTAR (COM THUMBNAIL)
function postarVideo(){

let video = document.getElementById("videoFile").files[0];
let thumb = document.getElementById("thumbFile").files[0];
let titulo = document.getElementById("titulo").value;

if(!video || !thumb || !titulo){
alert("Preencha tudo!");
return;
}

let readerVideo = new FileReader();
let readerThumb = new FileReader();

readerVideo.onload = () => {

readerThumb.onload = () => {

videos.unshift({
titulo,
video: readerVideo.result,
thumb: readerThumb.result,
dono: usuario,
views:0,
likes:0,
comentarios:[]
});

localStorage.setItem("videos", JSON.stringify(videos));

alert("Postado!");
carregarVideos();
}

readerThumb.readAsDataURL(thumb);
}

readerVideo.readAsDataURL(video);
}

// 📺 CARREGAR (AGORA FUNCIONA)
function carregarVideos(){

let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{

lista.innerHTML+=`
<div class="video" onclick="abrirVideo(${i})">
<img class="thumb" src="${v.thumb}">
<p>${v.titulo}</p>
<p>${v.dono}</p>
<p>👁️ ${v.views}</p>
</div>
`;

});
}

// 🔍 PESQUISA
document.getElementById("pesquisa").oninput = (e)=>{
let termo = e.target.value.toLowerCase();

let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(termo)){
lista.innerHTML+=`
<div class="video" onclick="abrirVideo(${i})">
<img class="thumb" src="${v.thumb}">
<p>${v.titulo}</p>
</div>`;
}
});
}

// ▶️ ABRIR
function abrirVideo(id){
localStorage.setItem("videoAtual", id);
window.location.href="video.html";
}

// 👤 CANAL
function irCanal(){
window.location.href="canal.html";
}

carregarVideos();

  <div id="menuPerfil" style="
position:absolute;
right:10px;
top:60px;
background:#202020;
padding:10px;
display:none;
border-radius:10px;
">

<p onclick="login()">👤 Login</p>
<p onclick="irCanal()">📺 Meu canal</p>
<p onclick="mudarFoto()">🖼️ Mudar foto</p>
<p onclick="mudarNome()">✏️ Mudar nome</p>
<p onclick="mudarIdioma()">🌐 Idioma</p>
<p onclick="logout()">🚪 Sair</p>

</div>


</script>

</body>
</html>
