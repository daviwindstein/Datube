<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Datuber - Página Inicial</title>
<style>
  body { margin:0; font-family:Arial, sans-serif; background:#0f0f0f; color:#ddd; }
  header { display:flex; align-items:center; justify-content:space-between; padding:10px; background:#202020; }
  input { padding:5px; width:200px; border-radius:4px; border:1px solid #444; }
  #videos { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:10px; }
  .video { background:#181818; border:1px solid #333; padding:5px; border-radius:5px; cursor:pointer; }
  .video video { width:100%; display:block; }
  .highlight { border:2px solid gold; }
  .login-box { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); 
               background:#202020; padding:20px; display:none; flex-direction:column; }
  .login-box input { margin:5px 0; }
  button { background:#e33; border:none; color:white; padding:5px 10px; margin:2px; cursor:pointer; border-radius:3px; }
</style>
</head>
<body>

<header>
  <h2>📺 Datuber</h2>
  <input id="pesquisa" placeholder="Pesquisar vídeos...">
  <div>
    <button onclick="abrirLogin()">Login</button>
    <button onclick="uploadVideo()">Postar</button>
  </div>
</header>

<h3>📜 Todos os vídeos</h3>
<div id="videos"></div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <input id="nome" placeholder="Nome do canal">
  <input id="foto" placeholder="URL da foto do canal">
  <button onclick="fazerLogin()">Entrar</button>
  <button onclick="criarConta()">Criar Conta</button>
  <button onclick="fecharLogin()">Fechar</button>
</div>

<script>
// Inicialização: carrega arrays de usuários e vídeos do localStorage (ou cria se não existir)
let usuario = localStorage.getItem("usuario");
let users = JSON.parse(localStorage.getItem("users") || "[]");
let videos = JSON.parse(localStorage.getItem("videos") || "[]");

// Abre/fecha janela de login
window.abrirLogin = () => document.getElementById("loginBox").style.display = "flex";
window.fecharLogin = () => document.getElementById("loginBox").style.display = "none";

// Criar nova conta (cadastro simples)
function criarConta() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value;
  let nomeCanal = document.getElementById("nome").value.trim() || u;
  let foto = document.getElementById("foto").value.trim() || "https://via.placeholder.com/50";
  if (!u || !p) { alert("Preencha usuário e senha!"); return; }
  if (users.find(x => x.username === u)) { alert("Usuário já existe!"); return; }
  users.push({username:u, password:p, nome:nomeCanal, foto:foto});
  localStorage.setItem("users", JSON.stringify(users));
  alert("Conta criada com sucesso!");
  fecharLogin();
}

// Autenticar (login)
function fazerLogin() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value;
  let found = users.find(x => x.username===u && x.password===p);
  if (found) {
    usuario = u;
    localStorage.setItem("usuario", u);
    fecharLogin();
    alert("Logado como " + found.nome);
    carregarVideos();  // pode atualizar UI se necessário
  } else {
    alert("Usuário ou senha inválidos!");
  }
}

// Upload de vídeo: lê arquivo local e armazena
function uploadVideo() {
  if (!usuario) { alert("Faça login para postar."); return; }
  let input = document.createElement("input");
  input.type = "file"; input.accept = "video/*";
  input.onchange = () => {
    let file = input.files[0];
    if (!file) return;
    if (file.size > 200*1024*1024) { alert("Vídeo muito grande (máx ~200MB)."); return; }
    let reader = new FileReader();
    reader.onload = () => {
      let donoObj = users.find(x => x.username === usuario);
      let novo = {
        titulo: prompt("Título do vídeo:", file.name) || file.name,
        url: reader.result,
        dono: usuario, nomeDono: donoObj.nome, fotoDono: donoObj.foto,
        likes:0, inscritos:[], comentarios:[], views:0, data: Date.now()
      };
      videos.push(novo);
      localStorage.setItem("videos", JSON.stringify(videos));
      carregarVideos();  // atualiza lista sem recarregar a página
      alert(`Vídeo "${novo.titulo}" postado!`);
    };
    reader.readAsDataURL(file);  // base64【15†L212-L220】
  };
  input.click();
}

// Carrega e exibe vídeos (com filtro opcional de pesquisa)
function carregarVideos(termo="") {
  let container = document.getElementById("videos");
  container.innerHTML = "";
  // Filtra por título
  let list = videos.filter(v => v.titulo.toLowerCase().includes(termo.toLowerCase()));
  if (list.length === 0) {
    container.innerHTML = "<p>Nenhum vídeo encontrado.</p>";
    return;
  }
  // Destaca vídeo mais recente (maior timestamp) e mais visto (maior views) – opcionais
  // (Aqui optamos por simplesmente listar todos juntos; estilos .highlight podem ser aplicados)
  list.forEach((v, i) => {
    // Para cada vídeo cria um bloco .video clicável
    container.innerHTML += `
      <div class="video" onclick="abrirVideo(${videos.indexOf(v)})">
        <video src="${v.url}" muted></video>
        <p><b>${v.titulo}</b></p>
        <p>${v.nomeDono}</p>
      </div>`;
  });
}

// Pesquisa em tempo real
document.getElementById("pesquisa").oninput = e => {
  carregarVideos(e.target.value);
};

// Ao carregar a página, exibe vídeos existentes
window.addEventListener("load", () => { carregarVideos(); });


// Navega para reprodução do vídeo (seta videoAtual e vai para video.html)
function abrirVideo(id) {
  videos[id].views = (videos[id].views || 0) + 1;
  localStorage.setItem("videos", JSON.stringify(videos));
  localStorage.setItem("videoAtual", id);
  window.location.href = "video.html";
}
</script>
</body>
</html>
