<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f0f; color:white; }

header {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#202020;
}

input { padding:5px; }

#videos {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  padding:10px;
}

.video { cursor:pointer; }
.thumb { width:100%; border-radius:10px; }

.login-box {
  position:fixed;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  background:#202020;
  padding:20px;
  display:none;
  flex-direction:column;
}

button {
  background:red;
  border:none;
  color:white;
  padding:5px;
  margin:2px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h2>📺 Datuber</h2>
  <input id="pesquisa" placeholder="Pesquisar...">
  <div>
    <button onclick="abrirLogin()">Login</button>
    <button onclick="uploadVideo()">Postar</button>
  </div>
</header>

<div id="videos"></div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">
  <button onclick="fazerLogin()">Entrar</button>
  <button onclick="criarConta()">Criar Conta</button>
  <button onclick="fecharLogin()">Fechar</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "COLE_AQUI",
  projectId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuario = localStorage.getItem("user");

// LOGIN UI
window.abrirLogin = () => document.getElementById("loginBox").style.display = "flex";
window.fecharLogin = () => document.getElementById("loginBox").style.display = "none";

// CRIAR CONTA
window.criarConta = async () => {
  let user = userInput();
  let pass = passInput();

  if(!user || !pass) return alert("Preencha tudo!");

  let q = await getDocs(collection(db,"users"));
  for(let d of q.docs){
    if(d.data().username === user) return alert("Já existe!");
  }

  await addDoc(collection(db,"users"), {username:user, password:pass});
  alert("Conta criada!");
}

// LOGIN
window.fazerLogin = async () => {
  let user = userInput();
  let pass = passInput();

  let q = await getDocs(collection(db,"users"));
  for(let d of q.docs){
    let u = d.data();
    if(u.username===user && u.password===pass){
      usuario=user;
      localStorage.setItem("user",user);
      fecharLogin();
      return alert("Logado!");
    }
  }

  alert("Erro login!");
}

// POSTAR VÍDEO DO PC
window.uploadVideo = () => {
  if(!usuario){
    alert("Faça login!");
    return;
  }

  let input = document.createElement("input");
  input.type = "file";
  input.accept = "video/*";
  input.click();

  input.onchange = () => {
    let file = input.files[0];

    if(!file){
      alert("Nenhum vídeo escolhido");
      return;
    }

    let titulo = prompt("Título do vídeo:");

    let reader = new FileReader();

    reader.onload = () => {
      let url = reader.result; // vídeo em base64

      // pegar vídeos existentes ou criar lista
      let videos = JSON.parse(localStorage.getItem("videos")) || [];

      videos.push({
        titulo: titulo,
        url: url,
        dono: usuario
      });

      localStorage.setItem("videos", JSON.stringify(videos));

      alert("Vídeo postado!");
      carregarVideosLocal();
    }

    reader.readAsDataURL(file);
  }
}
  // CARREGAR VÍDEOS LOCAIS
function carregarVideosLocal(){
  let lista = document.getElementById("videos");
  lista.innerHTML = "";

  let videos = JSON.parse(localStorage.getItem("videos")) || [];

  videos.forEach((v, i) => {
    lista.innerHTML += `
      <div class="video" onclick="abrirVideoLocal(${i})">
        <video src="${v.url}" width="300" controls></video>
        <p>${v.titulo}</p>
        <p>${v.dono}</p>
      </div>
    `;
  });
}
// PESQUISA
document.getElementById("pesquisa").oninput = async (e)=>{
  let termo = e.target.value.toLowerCase();
  let lista = document.getElementById("videos");
  lista.innerHTML="";

  let q = await getDocs(collection(db,"videos"));

  q.forEach(doc=>{
    let v = doc.data();
    if(v.titulo.toLowerCase().includes(termo)){
      lista.innerHTML+=`
      <div class="video" onclick="abrirVideo('${doc.id}')">
        <img class="thumb" src="${v.thumb}">
        <p>${v.titulo}</p>
      </div>`;
    }
  });
}

window.abrirVideo = (id)=>{
  window.location.href = "video.html?id="+id;
}

function userInput(){ return document.getElementById("user").value.trim(); }
function passInput(){ return document.getElementById("pass").value.trim(); }

carregarVideos();

</script>

</body>
</html>
