<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}
header{display:flex;justify-content:space-between;padding:10px;background:#202020;}
#videos{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;padding:10px;}
.video{background:#1c1c1c;padding:5px;border-radius:10px;cursor:pointer;}
img{width:100%;}
.menu{position:absolute;right:10px;top:50px;background:#202020;display:none;padding:10px;}
button{background:red;color:white;border:none;padding:5px;}
</style>
</head>

<body>

<header>
<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div>
<button onclick="abrirCriar()">➕ Criar</button>
<button onclick="toggleMenu()">👤</button>
</div>
</header>

<div id="menu" class="menu">
<p onclick="login()">Login</p>
<p onclick="irCanal()">Meu canal</p>
<p onclick="abrirStudio()">Studio</p>
<p onclick="logout()">Sair</p>
</div>

<div id="criarBox" style="display:none;padding:10px;">
<input type="file" id="videoFile" accept="video/*"><br><br>
<input type="file" id="thumbFile" accept="image/*"><br><br>
<input id="titulo" placeholder="Título"><br><br>
<textarea id="desc" placeholder="Descrição"></textarea><br><br>
<button onclick="postarVideo()">Postar</button>
</div>

<div id="videos"></div>

<script>
const supabase = window.supabase.createClient("SUA_URL","SUA_KEY");
let usuario = localStorage.getItem("user");

// MENU
function toggleMenu(){
let m=document.getElementById("menu");
m.style.display=m.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let nome=prompt("Nome:");
localStorage.setItem("user",nome);
usuario=nome;
alert("Logado!");
}

// LOGOUT
function logout(){
localStorage.removeItem("user");
location.reload();
}

// CANAL
function irCanal(){
location.href="canal.html?user="+usuario;
}

// STUDIO
function abrirStudio(){
location.href="studio.html";
}

// CRIAR
function abrirCriar(){
document.getElementById("criarBox").style.display="block";
}

// POSTAR
async function postarVideo(){
let video=videoFile.files[0];
let thumb=thumbFile.files[0];

if(!video||!thumb){alert("Escolhe tudo");return;}

let vName=Date.now()+video.name;
let tName=Date.now()+thumb.name;

await supabase.storage.from("videos").upload(vName,video);
await supabase.storage.from("thumbs").upload(tName,thumb);

let vURL=supabase.storage.from("videos").getPublicUrl(vName).data.publicUrl;
let tURL=supabase.storage.from("thumbs").getPublicUrl(tName).data.publicUrl;

await supabase.from("videos").insert([{
titulo:titulo.value,
descricao:desc.value,
url:vURL,
thumb:tURL,
dono:usuario,
views:0,
likes:0
}]);

// 🔔 NOTIFICAÇÃO
await supabase.from("notificacoes").insert([{texto:usuario+" postou vídeo!"}]);

alert("Postado!");
carregarVideos();
}

// CARREGAR
async function carregarVideos(){
let {data}=await supabase.from("videos").select("*");

videos.innerHTML="";

data.sort((a,b)=>(b.views+b.likes*2)-(a.views+a.likes*2));

data.forEach(v=>{
videos.innerHTML+=`
<div class="video" onclick="abrirVideo('${v.id}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
<p>${v.views} views</p>
</div>`;
});
}

// PESQUISA
pesquisa.oninput=async(e)=>{
let t=e.target.value.toLowerCase();
let {data}=await supabase.from("videos").select("*");

videos.innerHTML="";
data.forEach(v=>{
if(v.titulo.toLowerCase().includes(t)){
videos.innerHTML+=`
<div class="video" onclick="abrirVideo('${v.id}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
</div>`;
}
});
}

function abrirVideo(id){
location.href="video.html?id="+id;
}

carregarVideos();
</script>

</body>
</html>
