<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabase = window.supabase.createClient("SUA_URL","SUA_KEY");

let usuario = localStorage.getItem("user");

// 🔥 CARREGAR VÍDEOS COM ALGORITMO
async function carregarVideos(){
  let { data } = await supabase.from("videos").select("*");

  // 🔥 ALGORITMO (views + likes)
  data.sort((a,b)=>{
    let scoreA = a.views + a.likes*2;
    let scoreB = b.views + b.likes*2;
    return scoreB - scoreA;
  });

  let lista = document.getElementById("videos");
  lista.innerHTML="";

  data.forEach(v=>{
    lista.innerHTML += `
      <div onclick="abrirVideo('${v.id}')">
        <img src="${v.thumb}" width="100%">
        <p>${v.titulo}</p>
        <p>${v.views} views</p>
      </div>
    `;
  });
}

// 🔎 PESQUISA
document.getElementById("pesquisa").oninput = async (e)=>{
  let termo = e.target.value.toLowerCase();
  let { data } = await supabase.from("videos").select("*");

  let lista = document.getElementById("videos");
  lista.innerHTML="";

  data.forEach(v=>{
    if(v.titulo.toLowerCase().includes(termo)){
      lista.innerHTML += `
        <div onclick="abrirVideo('${v.id}')">
          <img src="${v.thumb}">
          <p>${v.titulo}</p>
        </div>
      `;
    }
  });
}

function abrirVideo(id){
  location.href = "video.html?id="+id;
}

// 🔴 BOTÃO CRIAR
function abrirCriar(){
  document.getElementById("uploadBox").style.display="block";
}

carregarVideos();
  <div id="uploadBox" style="display:none">
  <input type="file" id="videoFile" accept="video/*">
  <input type="file" id="thumbFile" accept="image/*">
  <input id="titulo" placeholder="Título">
  <textarea id="desc" placeholder="Descrição"></textarea>

  <button onclick="postarVideo()">Postar</button>
</div>
  async function postarVideo(){  
  let video = videoFile.files[0];  
  let thumb = thumbFile.files[0];  

  if(!video || !thumb){
    alert("Escolhe o vídeo e a thumbnail!");
    return;
  }

  let nomeVideo = Date.now()+video.name;  
  let nomeThumb = Date.now()+thumb.name;  

  await supabase.storage.from("videos").upload(nomeVideo, video);  
  await supabase.storage.from("thumbs").upload(nomeThumb, thumb);  

  let videoURL = supabase.storage.from("videos").getPublicUrl(nomeVideo).data.publicUrl;  
  let thumbURL = supabase.storage.from("thumbs").getPublicUrl(nomeThumb).data.publicUrl;  

  await supabase.from("videos").insert([{  
    titulo: titulo.value,  
    descricao: desc.value,  
    url: videoURL,  
    thumb: thumbURL,  
    dono: usuario,  
    views:0,  
    likes:0  
  }]);  

  alert("Postado!");  
  carregarVideos();  
}
</script>
