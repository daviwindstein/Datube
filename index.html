<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;align-items:center;">

<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div style="display:flex;gap:10px;align-items:center;">

<button onclick="abrirShorts()">🎬</button>
<button onclick="irStudio()">📊</button>
<button onclick="irCanal()">📺</button>
<button onclick="mudarIdioma()">🌐</button>

<img id="fotoPerfil" onclick="menu()" style="width:40px;height:40px;border-radius:50%;cursor:pointer;">

</div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;background:#222;padding:10px;position:absolute;right:10px;">
<p onclick="login()">Login</p>
<p onclick="logout()">Sair</p>
<p onclick="mudarFoto()">Foto</p>
<p onclick="mudarNome()">Nome</p>
</div>

<!-- UPLOAD -->
<div style="padding:10px;">
<input id="titulo" placeholder="Título"><br><br>
<input type="file" id="videoFile"><br><br>
<input type="file" id="thumbFile"><br><br>

<button onclick="postar()">📤 Postar</button>
</div>

<hr>

<div id="videos"></div>

<script>

// 👤 USER
let user = localStorage.getItem("user") || "Você";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";
document.getElementById("fotoPerfil").src = foto;

// MENU
function menu(){
let m = document.getElementById("menu");
m.style.display = m.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let nome = prompt("Nome:");
let senha = prompt("Senha:");
localStorage.setItem("user", nome);
localStorage.setItem("senha", senha);
location.reload();
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// FOTO
function mudarFoto(){
let input = document.createElement("input");
input.type="file";

input.onchange = ()=>{
let r = new FileReader();
r.onload = ()=>{
localStorage.setItem("foto", r.result);
location.reload();
}
r.readAsDataURL(input.files[0]);
}
input.click();
}

// NOME
function mudarNome(){
let n = prompt("Novo nome:");
localStorage.setItem("user", n);
location.reload();
}

// IDIOMA
function mudarIdioma(){
let lang = localStorage.getItem("lang") || "pt";
lang = lang=="pt"?"en":lang=="en"?"es":"pt";
localStorage.setItem("lang", lang);
alert("Idioma: "+lang);
}

// IR
function irCanal(){ window.location="canal.html"; }
function irStudio(){ window.location="studio.html"; }
function abrirShorts(){ window.location="shorts.html"; }

// VIDEOS
let videos = JSON.parse(localStorage.getItem("videos")) || [];

// POSTAR
function postar(){

let v = videoFile.files[0];
let t = thumbFile.files[0];
let titulo = document.getElementById("titulo").value;

if(!v || !t || !titulo){ alert("Preencha tudo"); return; }

let rv = new FileReader();
let rt = new FileReader();

rv.onload = ()=>{
rt.onload = ()=>{

videos.unshift({
titulo,
video: rv.result,
thumb: rt.result,
dono: user,
likes:0,
views:0
});

localStorage.setItem("videos", JSON.stringify(videos));
location.reload();

}
rt.readAsDataURL(t);
}
rv.readAsDataURL(v);
}

// CARREGAR
function carregar(){

videos = JSON.parse(localStorage.getItem("videos")) || [];

let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{
lista.innerHTML+=`
<div onclick="abrir(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
<p>${v.dono}</p>
</div>`;
});
}

// PESQUISA
pesquisa.oninput = (e)=>{
let t = e.target.value.toLowerCase();
let lista = document.getElementById("videos");
lista.innerHTML="";

videos.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(t)){
lista.innerHTML+=`
<div onclick="abrir(${i})">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>`;
}
});
}

// ABRIR
function abrir(i){
localStorage.setItem("videoAtual", i);
window.location="video.html";
}

carregar();

</script>

</body>
</html>
