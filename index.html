<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;align-items:center;">
<h2>📺 Datuber</h2>

<div>
<button onclick="home()">🏠</button>
<button onclick="irShorts()">🎬</button>
<button onclick="live()">🔴</button>
<button onclick="abrirCriar()">➕</button>
<img id="foto" style="width:40px;height:40px;border-radius:50%;cursor:pointer;">
</div>
</div>

<!-- MENU -->
<div id="menu" style="display:none;background:#222;position:absolute;right:10px;padding:10px;">
<p onclick="criarConta()">Criar Conta</p>
<p onclick="login()">Login</p>
<p onclick="logout()">Sair</p>
<p onclick="irCanal()">Meu Canal</p>
<p onclick="irStudio()">Studio</p>
<p onclick="idioma()">Idioma</p>
</div>

<!-- CRIAR -->
<div id="criar" style="display:none;background:#222;padding:10px;">
<button onclick="postarVideo()">🎥 Vídeo</button>
</div>

<hr>

<div id="feed"></div>

<script>

// USER
let user = localStorage.getItem("user") || "Você";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";
document.getElementById("foto").src = foto;

// MENU
document.getElementById("foto").onclick = ()=>{
let m = document.getElementById("menu");
m.style.display = m.style.display=="block"?"none":"block";
};

function abrirCriar(){
let c = document.getElementById("criar");
c.style.display = c.style.display=="block"?"none":"block";
}

// LOGIN
function criarConta(){
let n = prompt("Nome:");
localStorage.setItem("user",n);
location.reload();
}
function login(){
let n = prompt("Nome:");
localStorage.setItem("user",n);
location.reload();
}
function logout(){
localStorage.removeItem("user");
location.reload();
}

// NAV
function home(){ location.reload(); }
function irShorts(){ alert("shorts em breve"); }
function live(){ alert("live em breve"); }
function irCanal(){ location="canal.html"; }
function irStudio(){ location="studio.html"; }
function idioma(){ alert("PT / EN"); }

// BASE
function getVideos(){
return JSON.parse(localStorage.getItem("videos")) || [];
}

// POSTAR VIDEO
function postarVideo(){

let input = document.createElement("input");
input.type="file";
input.accept="video/*";

input.onchange = ()=>{

let file = input.files[0];
if(!file) return;

let thumbInput = document.createElement("input");
thumbInput.type="file";
thumbInput.accept="image/*";

thumbInput.onchange = ()=>{

let titulo = prompt("Título:");
let desc = prompt("Descrição:");

let videoURL = URL.createObjectURL(file);
let thumbURL = URL.createObjectURL(thumbInput.files[0]);

let videos = getVideos();

videos.unshift({
titulo,
desc,
video:videoURL,
thumb:thumbURL,
user,
views:0,
likes:0,
comentarios:[]
});

localStorage.setItem("videos",JSON.stringify(videos));

alert("Postado!");
carregar();

};

thumbInput.click();

};

input.click();
}

// FEED
function carregar(){

let feed = document.getElementById("feed");
let videos = getVideos();

feed.innerHTML = "";

if(videos.length==0){
feed.innerHTML="<p>Nenhum vídeo</p>";
return;
}

videos.forEach((v,i)=>{
feed.innerHTML += `
<div onclick="abrirVideo(${i})" style="margin:10px;cursor:pointer;">
<img src="${v.thumb}" width="250">
<p>${v.titulo}</p>
<p>${v.views} views</p>
</div>
`;
});

}

// ABRIR
function abrirVideo(i){
localStorage.setItem("videoAtual",i);
location="video.html";
}

carregar();

</script>

</body>
</html>
