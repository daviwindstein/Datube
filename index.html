<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Datuber</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial;}
header{
display:flex;
align-items:center;
justify-content:space-between;
background:#202020;
padding:10px;
}

.logo{font-size:20px;font-weight:bold;color:red;}

.search{width:40%;padding:5px;}

#videos{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:10px;
padding:10px;
}

.video{
background:#1c1c1c;
padding:5px;
border-radius:10px;
cursor:pointer;
}

img{width:100%;border-radius:10px;}

.menu{
position:absolute;
right:10px;
top:50px;
background:#202020;
display:none;
padding:10px;
}

button{background:red;color:white;border:none;padding:5px;margin:2px;}
</style>
</head>

<body>

<header>

<div class="logo">📺 Datuber</div>

<input id="pesquisa" class="search" placeholder="Pesquisar">

<div>
<button onclick="abrirCriar()">➕ Criar</button>
<button onclick="toggleMenu()">👤</button>
</div>

</header>

<!-- MENU PERFIL -->
<div id="menu" class="menu">
<p onclick="login()">Login</p>
<p onclick="irCanal()">Meu canal</p>
<p onclick="logout()">Sair</p>
</div>

<!-- CRIAR -->
<div id="criarBox" style="display:none;padding:10px;">
<h3>Enviar vídeo</h3>
<input type="file" id="videoFile" accept="video/*"><br><br>
<input type="file" id="thumbFile" accept="image/*"><br><br>
<input id="titulo" placeholder="Título"><br><br>
<textarea id="desc" placeholder="Descrição"></textarea><br><br>
<button onclick="postarVideo()">Postar</button>
</div>

<div id="videos"></div>

<script>

const supabase = window.supabase.createClient("SUA_URL","SUA_KEY");

let usuario = localStorage.getItem("user");

// MENU
function toggleMenu(){
let m = document.getElementById("menu");
m.style.display = m.style.display=="block"?"none":"block";
}

// LOGIN SIMPLES
function login(){
let nome = prompt("Digite seu nome:");
localStorage.setItem("user",nome);
usuario = nome;
alert("Logado!");
}

// LOGOUT
function logout(){
localStorage.removeItem("user");
alert("Saiu!");
}

// IR CANAL
function irCanal(){
alert("Em breve canal completo");
}

// ABRIR CRIAR
function abrirCriar(){
document.getElementById("criarBox").style.display="block";
}

// 🚀 POSTAR
async function postarVideo(){

let video = videoFile.files[0];
let thumb = thumbFile.files[0];

if(!video || !thumb){
alert("Escolhe vídeo e thumbnail!");
return;
}

let nomeV = Date.now()+video.name;
let nomeT = Date.now()+thumb.name;

await supabase.storage.from("videos").upload(nomeV, video);
await supabase.storage.from("thumbs").upload(nomeT, thumb);

let vURL = supabase.storage.from("videos").getPublicUrl(nomeV).data.publicUrl;
let tURL = supabase.storage.from("thumbs").getPublicUrl(nomeT).data.publicUrl;

await supabase.from("videos").insert([{
titulo: titulo.value,
descricao: desc.value,
url: vURL,
thumb: tURL,
dono: usuario,
views:0,
likes:0
}]);

alert("Postado!");
carregarVideos();
}

// 📺 CARREGAR
async function carregarVideos(){

let { data } = await supabase.from("videos").select("*");

let lista = document.getElementById("videos");
lista.innerHTML="";

// algoritmo
data.sort((a,b)=> (b.views+b.likes*2)-(a.views+a.likes*2));

data.forEach(v=>{
lista.innerHTML += `
<div class="video" onclick="abrirVideo('${v.id}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
<p>${v.views} views</p>
</div>
`;
});
}

// 🔍 PESQUISA
pesquisa.oninput = async (e)=>{
let termo = e.target.value.toLowerCase();

let { data } = await supabase.from("videos").select("*");

videos.innerHTML="";

data.forEach(v=>{
if(v.titulo.toLowerCase().includes(termo)){
videos.innerHTML+=`
<div class="video" onclick="abrirVideo('${v.id}')">
<img src="${v.thumb}">
<p>${v.titulo}</p>
</div>`;
}
});
}

// ▶️
function abrirVideo(id){
location.href="video.html?id="+id;
}

carregarVideos();

</script>

</body>
</html>
