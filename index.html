<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;">
<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div>
<button onclick="abrirCriar()">➕</button>
<img id="fotoPerfil" onclick="abrirMenu()" style="width:40px;border-radius:50%;cursor:pointer;">
</div>
</div>

<!-- MENU PERFIL -->
<div id="menuPerfil" style="display:none;position:absolute;right:10px;background:#222;padding:10px;">
<p onclick="login()">Login</p>
<p onclick="mudarFoto()">Foto</p>
</div>

<!-- MENU CRIAR -->
<div id="menuCriar" style="display:none;background:#222;padding:10px;">
<button onclick="criarVideo()">🎥 Vídeo</button>
<button onclick="criarShort()">🎬 Shorts</button>
</div>

<hr>

<div id="feed"></div>

<script>

// USER
let user = localStorage.getItem("user") || "Você";
fotoPerfil.src = localStorage.getItem("foto") || "https://via.placeholder.com/40";

// MENU
function abrirMenu(){
menuPerfil.style.display = menuPerfil.style.display=="block"?"none":"block";
}
function abrirCriar(){
menuCriar.style.display = menuCriar.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let n = prompt("Nome:");
localStorage.setItem("user", n);
location.reload();
}

// FOTO
function mudarFoto(){
let i=document.createElement("input");
i.type="file";
i.onchange=()=>{
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("foto",r.result);
location.reload();
}
r.readAsDataURL(i.files[0]);
}
i.click();
}

// BASE
function getVideos(){
return JSON.parse(localStorage.getItem("videos")) || [];
}
function setVideos(v){
localStorage.setItem("videos",JSON.stringify(v));
}

// 🎥 VIDEO
function criarVideo(){

let v=document.createElement("input");
v.type="file"; v.accept="video/*";

let t=document.createElement("input");
t.type="file"; t.accept="image/*";

v.click();

v.onchange=()=>{
t.click();

t.onchange=()=>{

let titulo=prompt("Título:");

let rv=new FileReader();
let rt=new FileReader();

rv.onload=()=>{
rt.onload=()=>{

let videos=getVideos();

videos.unshift({
titulo,
video:rv.result,
thumb:rt.result
});

setVideos(videos);

alert("Postado!");
carregar();

}
rt.readAsDataURL(t.files[0]);
}
rv.readAsDataURL(v.files[0]);

}
}
}

// 🎬 SHORTS
function criarShort(){

let v=document.createElement("input");
v.type="file"; v.accept="video/*";

v.click();

v.onchange=()=>{
let r=new FileReader();

r.onload=()=>{
let shorts = JSON.parse(localStorage.getItem("shorts"))||[];
shorts.unshift({video:r.result});
localStorage.setItem("shorts",JSON.stringify(shorts));
alert("Short criado!");
}

r.readAsDataURL(v.files[0]);
}
}

// 🔥 FEED
function carregar(){

let videos=getVideos();
feed.innerHTML="";

if(videos.length==0){
feed.innerHTML="<p>Nenhum vídeo</p>";
return;
}

videos.forEach((v,i)=>{
feed.innerHTML+=`
<div onclick="abrirVideo(${i})" style="margin:10px;cursor:pointer;">
<img src="${v.thumb}" width="200">
<p>${v.titulo}</p>
</div>
`;
});

}

// ▶ ABRIR VIDEO
function abrirVideo(i){
localStorage.setItem("video",i);
location="video.html";
}

carregar();

</script>

</body>
</html>
