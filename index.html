<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body style="background:#111;color:white;font-family:Arial;">

<h2>📺 Datuber</h2>

<button onclick="home()">🏠</button>
<button onclick="shorts()">🎬</button>
<button onclick="live()">🔴</button>
<button onclick="abrirCriar()">➕</button>

<img id="foto" style="width:40px;border-radius:50%;cursor:pointer;">

<div id="menu" style="display:none;background:#222;position:absolute;">
<p onclick="login()">Login</p>
<p onclick="criarConta()">Criar Conta</p>
<p onclick="canal()">Canal</p>
<p onclick="studio()">Studio</p>
<p onclick="mudarFoto()">Foto</p>
<p onclick="idioma()">Idioma</p>
</div>

<div id="criar" style="display:none;">
<button onclick="postar()">🎥 Vídeo</button>
<button onclick="postarShort()">🎬 Shorts</button>
<button onclick="postarPost()">📝 Post</button>
</div>

<hr>
<div id="feed"></div>

<script>

// 🔥 CONFIGURA AQUI
const supabase = supabase.createClient(
"COLE_SUA_URL_AQUI",
"COLE_SUA_KEY_AQUI"
);

// MENU
foto.onclick=()=> menu.style.display = menu.style.display=="block"?"none":"block";
function abrirCriar(){ criar.style.display = criar.style.display=="block"?"none":"block"; }

// LOGIN SIMPLES
function login(){ localStorage.setItem("user",prompt("Nome")); }
function criarConta(){ login(); }

// POSTAR VIDEO REAL
async function postar(){

let input = document.createElement("input");
input.type="file";
input.accept="video/*";

input.onchange = async ()=>{

let file = input.files[0];
if(!file) return;

let titulo = prompt("Título:");

let nome = Date.now()+"_"+file.name;

// UPLOAD
await supabase.storage.from("videos").upload(nome, file);

// LINK
let { data } = supabase.storage.from("videos").getPublicUrl(nome);

let videos = JSON.parse(localStorage.getItem("videos"))||[];

videos.unshift({
titulo,
video:data.publicUrl,
views:0,
likes:0
});

localStorage.setItem("videos",JSON.stringify(videos));

carregar();
}

input.click();
}

// FEED
function carregar(){

let videos = JSON.parse(localStorage.getItem("videos"))||[];

feed.innerHTML="";

videos.forEach((v,i)=>{
feed.innerHTML+=`
<div onclick="abrirVideo(${i})">
<p>${v.titulo}</p>
<video src="${v.video}" width="250"></video>
</div>
`;
});
}

// ABRIR
function abrirVideo(i){
localStorage.setItem("video",i);
location="video.html";
}

// OUTROS
function home(){ location.reload(); }
function shorts(){ alert("shorts em breve"); }
function live(){ alert("live em breve"); }
function canal(){ alert("canal em breve"); }
function studio(){ alert("studio em breve"); }
function mudarFoto(){ alert("em breve"); }
function idioma(){ alert("PT/EN"); }

carregar();

</script>

</body>
</html>
