<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Datuber</title>
</head>

<body style="margin:0;background:#111;color:white;font-family:Arial;">

<!-- HEADER -->
<div style="display:flex;justify-content:space-between;background:#202020;padding:10px;">
<h2>📺 Datuber</h2>

<input id="pesquisa" placeholder="Pesquisar">

<div>
<button onclick="abrirCriar()">➕</button>
<button onclick="irShorts()">🎬</button>
<button onclick="abrirLive()">🔴</button>
<img id="foto" style="width:40px;border-radius:50%;cursor:pointer;">
</div>
</div>

<!-- MENU PERFIL -->
<div id="menu" style="display:none;background:#222;position:absolute;right:10px;padding:10px;">
<p onclick="criarConta()">Criar Conta</p>
<p onclick="login()">Login</p>
<p onclick="logout()">Sair</p>
<p onclick="alert('Canal em breve')">Canal</p>
<p onclick="alert('Studio em breve')">Studio</p>
</div>

<!-- CRIAR -->
<div id="criar" style="display:none;background:#222;padding:10px;">
<button onclick="postarVideo()">🎥 Vídeo</button>
</div>

<hr>
<div id="feed"></div>

<script>

let user = localStorage.getItem("user") || "Você";
foto.src = localStorage.getItem("foto") || "https://via.placeholder.com/40";

// MENU
foto.onclick=()=> menu.style.display = menu.style.display=="block"?"none":"block";
function abrirCriar(){ criar.style.display = criar.style.display=="block"?"none":"block"; }

// LOGIN
function criarConta(){
let n = prompt("Nome:");
localStorage.setItem("user",n);
location.reload();
}
function login(){
let n = prompt("Nome:");
localStorage.setItem("user",n);
location.reload();
}
function logout(){
localStorage.removeItem("user");
location.reload();
}

// BASE
function getVideos(){
return JSON.parse(localStorage.getItem("videos"))||[];
}

// POSTAR VIDEO
function postarVideo(){

let v=document.createElement("input");
v.type="file"; v.accept="video/*";

let t=document.createElement("input");
t.type="file"; t.accept="image/*";

v.click();

v.onchange=()=>{
t.click();

t.onchange=()=>{

let titulo=prompt("Título:");
let desc=prompt("Descrição:");

let rv=new FileReader();
let rt=new FileReader();

rv.onload=()=>{
rt.onload=()=>{

let vids=getVideos();

vids.unshift({
titulo,
desc,
video:rv.result,
thumb:rt.result,
likes:0,
views:0,
comentarios:[]
});

localStorage.setItem("videos",JSON.stringify(vids));
carregar();

}

rt.readAsDataURL(t.files[0]);
}
rv.readAsDataURL(v.files[0]);

}
}
}

// FEED
function carregar(){

let vids=getVideos();
feed.innerHTML="";

vids.forEach((v,i)=>{
feed.innerHTML+=`
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="250">
<p>${v.titulo}</p>
<p>${v.views} views</p>
</div>
`;
});
}

// ABRIR VIDEO
function abrirVideo(i){
localStorage.setItem("video",i);
location="video.html";
}

carregar();

</script>
</body>
</html>
