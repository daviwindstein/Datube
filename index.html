<script>

// 👤 USER
let user = localStorage.getItem("user") || "Você";
let foto = localStorage.getItem("foto") || "https://via.placeholder.com/40";
document.getElementById("fotoPerfil").src = foto;

// MENU
function abrirMenu(){
menuPerfil.style.display = menuPerfil.style.display=="block"?"none":"block";
}
function abrirCriar(){
menuCriar.style.display = menuCriar.style.display=="block"?"none":"block";
}

// LOGIN
function login(){
let n = prompt("Nome:");
localStorage.setItem("user", n);
location.reload();
}

// FOTO
function mudarFoto(){
let i = document.createElement("input");
i.type="file";
i.onchange=()=>{
let r=new FileReader();
r.onload=()=>{
localStorage.setItem("foto",r.result);
location.reload();
}
r.readAsDataURL(i.files[0]);
}
i.click();
}

// IDIOMA
function mudarIdioma(){
let l = localStorage.getItem("lang")||"pt";
l = l=="pt"?"en":l=="en"?"es":"pt";
localStorage.setItem("lang",l);
alert("Idioma: "+l);
}

// NAV
function irCanal(){ location="canal.html"; }
function irStudio(){ location="studio.html"; }
function abrirLive(){ alert("Live em breve"); }
function irShorts(){ location="shorts.html"; }
function home(){ location.reload(); }

// 🔥 BASE (SEMPRE RECARREGA)
function getVideos(){
return JSON.parse(localStorage.getItem("videos")) || [];
}
function getShorts(){
return JSON.parse(localStorage.getItem("shorts")) || [];
}

// 🎥 POSTAR VIDEO (CORRIGIDO)
function criarVideo(){

let v = document.createElement("input");
v.type="file"; v.accept="video/*";

let t = document.createElement("input");
t.type="file"; t.accept="image/*";

v.click();

v.onchange=()=>{

if(!v.files[0]) return;

t.click();

t.onchange=()=>{

let titulo = prompt("Título:");
let desc = prompt("Descrição:");

let rv = new FileReader();
let rt = new FileReader();

rv.onload=()=>{
rt.onload=()=>{

let videos = getVideos();

videos.unshift({
titulo,
desc,
video:rv.result,
thumb:rt.result,
dono:user
});

localStorage.setItem("videos",JSON.stringify(videos));

alert("Vídeo postado!");
carregar();

}

rt.readAsDataURL(t.files[0]);
}

rv.readAsDataURL(v.files[0]);

}

}
}

// 🎬 SHORTS (CORRIGIDO)
function criarShort(){

let v=document.createElement("input");
v.type="file"; v.accept="video/*";

v.click();

v.onchange=()=>{

let r=new FileReader();

r.onload=()=>{

let shorts = getShorts();

shorts.unshift({
video:r.result
});

localStorage.setItem("shorts",JSON.stringify(shorts));

alert("Short postado!");

}

r.readAsDataURL(v.files[0]);

}

}

// 📝 POST
function criarPost(){
let texto = prompt("Escreva algo:");
let posts = JSON.parse(localStorage.getItem("posts")) || [];
posts.unshift({texto});
localStorage.setItem("posts",JSON.stringify(posts));
carregar();
}

// 🔥 CARREGAR VIDEOS (FIX PRINCIPAL)
function carregar(){

let lista = getVideos();

feed.innerHTML="";

if(lista.length === 0){
feed.innerHTML = "<p>Nenhum vídeo encontrado</p>";
return;
}

lista.forEach((v,i)=>{

feed.innerHTML += `
<div onclick="abrirVideo(${i})" style="margin:10px;cursor:pointer;">
<img src="${v.thumb}" width="250">
<p>${v.titulo}</p>
<p>${v.dono || ""}</p>
</div>
`;

});

}

// 🔍 PESQUISA (FIX)
pesquisa.oninput=(e)=>{

let termo = e.target.value.toLowerCase();
let lista = getVideos();

feed.innerHTML="";

lista.forEach((v,i)=>{
if(v.titulo.toLowerCase().includes(termo)){
feed.innerHTML += `
<div onclick="abrirVideo(${i})">
<img src="${v.thumb}" width="250">
<p>${v.titulo}</p>
</div>
`;
}
});

}

// ▶ ABRIR VIDEO
function abrirVideo(i){
localStorage.setItem("videoAtual",i);
location="video.html";
}

// START
carregar();

</script>
